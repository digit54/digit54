<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCREENSAVER - Cerchi Concentrici</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// =====================
// WEB AUDIO API SOUND ENGINE
// =====================
const SFX = (() => {
  let audioCtx = null;
  let masterGain = null;

  function init() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }

  function now() { return audioCtx ? audioCtx.currentTime : 0; }

  // Suono posizionamento lettera (fase 0): bip cristallino ascendente
  function letterPlace(index) {
    init();
    const t = now();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400 + index * 80, t);
    osc.frequency.exponentialRampToValueAtTime(600 + index * 80, t + 0.08);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t); osc.stop(t + 0.2);

    // Armonico sottile
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(800 + index * 120, t);
    gain2.gain.setValueAtTime(0.08, t);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc2.connect(gain2); gain2.connect(masterGain);
    osc2.start(t); osc2.stop(t + 0.15);
  }

  // Suono dissoluzione cerchi (fase 1): atmosfera spaziale profonda
  let spaceDrone = null;     // drone continuo durante la dissoluzione
  let spaceDroneGain = null;
  let spaceDroneFilter = null;
  let spaceLFO = null;

  function dissolveStart() {
    init();
    const t = now();

    // === DRONE SPAZIALE PROFONDO (continuo per tutta la fase 1) ===
    // Onda fondamentale bassa
    const drone1 = audioCtx.createOscillator();
    drone1.type = 'sine';
    drone1.frequency.setValueAtTime(55, t); // La1 profondo
    drone1.frequency.linearRampToValueAtTime(40, t + 12);

    // Onda quinta sopra per profondità
    const drone2 = audioCtx.createOscillator();
    drone2.type = 'sine';
    drone2.frequency.setValueAtTime(82, t); // quinta
    drone2.frequency.linearRampToValueAtTime(60, t + 12);

    // Sub-bass pulsante
    const drone3 = audioCtx.createOscillator();
    drone3.type = 'triangle';
    drone3.frequency.setValueAtTime(35, t);
    drone3.frequency.linearRampToValueAtTime(25, t + 12);

    // LFO per modulazione tremolo spaziale
    spaceLFO = audioCtx.createOscillator();
    spaceLFO.type = 'sine';
    spaceLFO.frequency.setValueAtTime(0.3, t);
    spaceLFO.frequency.linearRampToValueAtTime(2.5, t + 10);
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.setValueAtTime(0.015, t);
    lfoGain.gain.linearRampToValueAtTime(0.04, t + 8);

    // Gain master del drone
    spaceDroneGain = audioCtx.createGain();
    spaceDroneGain.gain.setValueAtTime(0, t);
    spaceDroneGain.gain.linearRampToValueAtTime(0.12, t + 2);

    // Filtro passa-basso che si apre progressivamente
    spaceDroneFilter = audioCtx.createBiquadFilter();
    spaceDroneFilter.type = 'lowpass';
    spaceDroneFilter.frequency.setValueAtTime(200, t);
    spaceDroneFilter.frequency.exponentialRampToValueAtTime(2000, t + 8);
    spaceDroneFilter.Q.setValueAtTime(3, t);

    // Connessioni
    spaceLFO.connect(lfoGain);
    lfoGain.connect(spaceDroneGain.gain);

    drone1.connect(spaceDroneGain);
    drone2.connect(spaceDroneGain);
    drone3.connect(spaceDroneGain);
    spaceDroneGain.connect(spaceDroneFilter);
    spaceDroneFilter.connect(masterGain);

    drone1.start(t); drone2.start(t); drone3.start(t); spaceLFO.start(t);
    spaceDrone = [drone1, drone2, drone3];
  }

  function dissolveStop() {
    if (!spaceDrone || !audioCtx) return;
    const t = now();
    // Fade out del drone
    spaceDroneGain.gain.linearRampToValueAtTime(0, t + 1.5);
    spaceDrone.forEach(d => d.stop(t + 1.6));
    if (spaceLFO) spaceLFO.stop(t + 1.6);
    spaceDrone = null;
  }

  function dissolveWhoosh(progress) {
    init();
    const t = now();

    // Aggiorna il filtro del drone in base al progresso
    if (spaceDroneFilter) {
      const freq = 200 + progress * 3000;
      spaceDroneFilter.frequency.linearRampToValueAtTime(Math.min(freq, 4000), t + 0.3);
    }
    if (spaceDroneGain) {
      const vol = progress < 0.7 ? 0.12 + progress * 0.08 : 0.2 * (1.3 - progress) * 3.33;
      spaceDroneGain.gain.linearRampToValueAtTime(Math.max(0.01, vol), t + 0.3);
    }

    // === SCINTILLII STELLARI (toni alti random) ===
    if (Math.random() < 0.6) {
      const sparkFreq = 1200 + Math.random() * 3000;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(sparkFreq, t);
      osc.frequency.exponentialRampToValueAtTime(sparkFreq * (0.5 + Math.random() * 0.8), t + 0.4);
      gain.gain.setValueAtTime(0.02 + Math.random() * 0.03, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + Math.random() * 0.3);
      // Panning stereo casuale
      const pan = audioCtx.createStereoPanner();
      pan.pan.setValueAtTime((Math.random() - 0.5) * 1.6, t);
      osc.connect(gain); gain.connect(pan); pan.connect(masterGain);
      osc.start(t); osc.stop(t + 0.6);
    }

    // === SWEEP COSMICO (ogni tanto) ===
    if (Math.random() < 0.3) {
      const sweep = audioCtx.createOscillator();
      const sweepGain = audioCtx.createGain();
      const sweepFilter = audioCtx.createBiquadFilter();
      sweep.type = 'sawtooth';
      const sFreq = 100 + Math.random() * 400;
      sweep.frequency.setValueAtTime(sFreq, t);
      sweep.frequency.exponentialRampToValueAtTime(sFreq * 0.1, t + 0.8);
      sweepFilter.type = 'bandpass';
      sweepFilter.frequency.setValueAtTime(sFreq * 2, t);
      sweepFilter.frequency.exponentialRampToValueAtTime(200, t + 0.8);
      sweepFilter.Q.setValueAtTime(5, t);
      sweepGain.gain.setValueAtTime(0.03, t);
      sweepGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      const pan = audioCtx.createStereoPanner();
      pan.pan.setValueAtTime((Math.random() - 0.5) * 1.8, t);
      sweep.connect(sweepFilter); sweepFilter.connect(sweepGain);
      sweepGain.connect(pan); pan.connect(masterGain);
      sweep.start(t); sweep.stop(t + 0.8);
    }

    // === VENTO COSMICO (rumore filtrato) ===
    if (progress > 0.2 && Math.random() < 0.2) {
      const bufLen = audioCtx.sampleRate * 0.5;
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.3 * Math.sin(i / bufLen * Math.PI);
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const windFilter = audioCtx.createBiquadFilter();
      windFilter.type = 'bandpass';
      windFilter.frequency.setValueAtTime(800 + progress * 2000, t);
      windFilter.Q.setValueAtTime(1.5, t);
      const windGain = audioCtx.createGain();
      windGain.gain.setValueAtTime(0.04, t);
      windGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      const pan = audioCtx.createStereoPanner();
      pan.pan.setValueAtTime((Math.random() - 0.5) * 2, t);
      src.connect(windFilter); windFilter.connect(windGain);
      windGain.connect(pan); pan.connect(masterGain);
      src.start(t); src.stop(t + 0.5);
    }
  }

  // Suono accelerazione/stress (fase 2): ronzio crescente
  function accelHum(intensity) {
    init();
    const t = now();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    const freq = 80 + intensity * 200;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.linearRampToValueAtTime(freq * 1.1, t + 0.15);
    gain.gain.setValueAtTime(0.03 + intensity * 0.04, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t); osc.stop(t + 0.15);
  }

  // Suono stress sparks (fase 2): crepitio
  function stressSpark() {
    init();
    const t = now();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'highpass'; flt.frequency.value = 3000;
    src.buffer = buf;
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    src.connect(flt); flt.connect(gain); gain.connect(masterGain);
    src.start(t); src.stop(t + 0.06);
  }

  // Suono esplosione linea (fase 2→3): boom profondo + rumore
  function lineExplode() {
    init();
    const t = now();
    // Boom basso
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.6);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t); osc.stop(t + 0.6);

    // Crunch
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.08));
    const src = audioCtx.createBufferSource();
    const gain2 = audioCtx.createGain();
    src.buffer = buf;
    gain2.gain.setValueAtTime(0.35, t);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(gain2); gain2.connect(masterGain);
    src.start(t); src.stop(t + 0.3);

    // Sibilante acuto
    const osc2 = audioCtx.createOscillator();
    const gain3 = audioCtx.createGain();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(2000, t);
    osc2.frequency.exponentialRampToValueAtTime(200, t + 0.4);
    gain3.gain.setValueAtTime(0.12, t);
    gain3.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc2.connect(gain3); gain3.connect(masterGain);
    osc2.start(t); osc2.stop(t + 0.4);
  }

  // Suono rimbalzo muro (fase 3/4): ZENGGGG metallico tipo proiettile su muro
  let lastBounceTime = 0;

  // Crea convolver per riverbero metallico (generato una sola volta)
  let reverbBuffer = null;
  function getReverbBuffer() {
    if (reverbBuffer) return reverbBuffer;
    init();
    const len = audioCtx.sampleRate * 1.8; // 1.8 secondi di riverbero
    reverbBuffer = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = reverbBuffer.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        // Decadimento esponenziale con risonanze metalliche
        const decay = Math.exp(-i / (audioCtx.sampleRate * 0.5));
        const metallic = Math.sin(i * 0.02) * Math.sin(i * 0.037) * Math.sin(i * 0.051);
        data[i] = (Math.random() * 2 - 1) * decay * 0.4 + metallic * decay * 0.15;
      }
    }
    return reverbBuffer;
  }

  function wallBounce(letterIndex) {
    init();
    const t = now();
    // Limita frequenza suoni rimbalzo per non saturare
    if (t - lastBounceTime < 0.08) return;
    lastBounceTime = t;

    // Frequenza base variabile per lettera (più alta = più acuto)
    const baseFreq = 800 + (letterIndex / 11) * 1200;

    // === IMPATTO INIZIALE: transiente metallico duro ===
    const impact = audioCtx.createOscillator();
    const impactGain = audioCtx.createGain();
    impact.type = 'sawtooth';
    impact.frequency.setValueAtTime(baseFreq * 2.5, t);
    impact.frequency.exponentialRampToValueAtTime(baseFreq, t + 0.008);
    impactGain.gain.setValueAtTime(0.3, t);
    impactGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    impact.connect(impactGain);
    impact.start(t); impact.stop(t + 0.04);

    // === RISONANZA METALLICA PRINCIPALE: il "ZENGGGG" ===
    // Tono fondamentale con vibrato
    const zeng1 = audioCtx.createOscillator();
    const zeng1Gain = audioCtx.createGain();
    zeng1.type = 'sine';
    zeng1.frequency.setValueAtTime(baseFreq, t);
    // Leggero pitch bend verso il basso (come metallo che vibra)
    zeng1.frequency.exponentialRampToValueAtTime(baseFreq * 0.85, t + 0.8);
    zeng1Gain.gain.setValueAtTime(0.18, t);
    zeng1Gain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    zeng1.connect(zeng1Gain);
    zeng1.start(t); zeng1.stop(t + 0.9);

    // Armonico inharmonico (tipico del metallo - rapporto non intero)
    const zeng2 = audioCtx.createOscillator();
    const zeng2Gain = audioCtx.createGain();
    zeng2.type = 'sine';
    zeng2.frequency.setValueAtTime(baseFreq * 2.76, t); // rapporto inharmonico
    zeng2.frequency.exponentialRampToValueAtTime(baseFreq * 2.3, t + 0.6);
    zeng2Gain.gain.setValueAtTime(0.09, t);
    zeng2Gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    zeng2.connect(zeng2Gain);
    zeng2.start(t); zeng2.stop(t + 0.7);

    // Terzo armonico metallico
    const zeng3 = audioCtx.createOscillator();
    const zeng3Gain = audioCtx.createGain();
    zeng3.type = 'sine';
    zeng3.frequency.setValueAtTime(baseFreq * 5.4, t); // alto, metallico
    zeng3.frequency.exponentialRampToValueAtTime(baseFreq * 4.2, t + 0.4);
    zeng3Gain.gain.setValueAtTime(0.04, t);
    zeng3Gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    zeng3.connect(zeng3Gain);
    zeng3.start(t); zeng3.stop(t + 0.5);

    // === VIBRATO / MODULAZIONE (il "tremolo" del metallo che vibra) ===
    const vibrato = audioCtx.createOscillator();
    const vibratoGain = audioCtx.createGain();
    vibrato.type = 'sine';
    vibrato.frequency.setValueAtTime(25 + letterIndex * 3, t); // vibrazione rapida
    vibrato.frequency.linearRampToValueAtTime(8, t + 0.8);
    vibratoGain.gain.setValueAtTime(baseFreq * 0.03, t);
    vibratoGain.gain.linearRampToValueAtTime(0, t + 0.8);
    vibrato.connect(vibratoGain);
    vibratoGain.connect(zeng1.frequency); // modula il pitch del tono principale
    vibrato.start(t); vibrato.stop(t + 0.8);

    // === RUMORE D'IMPATTO (il "crack" iniziale) ===
    const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const noiseData = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseData.length; i++) {
      noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.006));
    }
    const noiseSrc = audioCtx.createBufferSource();
    noiseSrc.buffer = noiseBuf;
    const noiseGain = audioCtx.createGain();
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.setValueAtTime(baseFreq * 1.5, t);
    noiseFilter.Q.setValueAtTime(2, t);
    noiseGain.gain.setValueAtTime(0.25, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    noiseSrc.connect(noiseFilter); noiseFilter.connect(noiseGain);
    noiseSrc.start(t); noiseSrc.stop(t + 0.05);

    // === BUS RIVERBERO: tutto passa qui ===
    const dryGain = audioCtx.createGain();
    dryGain.gain.setValueAtTime(0.7, t);
    const wetGain = audioCtx.createGain();
    wetGain.gain.setValueAtTime(0.5, t);
    const convolver = audioCtx.createConvolver();
    convolver.buffer = getReverbBuffer();

    // Panning stereo basato sulla posizione della lettera
    const pan = audioCtx.createStereoPanner();
    pan.pan.setValueAtTime((letterIndex / 11) * 1.4 - 0.7, t);

    // Connetti tutti i generatori al bus dry+wet
    const sumBus = audioCtx.createGain();
    sumBus.gain.value = 1;
    impactGain.connect(sumBus);
    zeng1Gain.connect(sumBus);
    zeng2Gain.connect(sumBus);
    zeng3Gain.connect(sumBus);
    noiseGain.connect(sumBus);

    // Dry path
    sumBus.connect(dryGain);
    dryGain.connect(pan);

    // Wet path (riverbero)
    sumBus.connect(convolver);
    convolver.connect(wetGain);
    wetGain.connect(pan);

    // Output finale
    pan.connect(masterGain);
  }

  // Suono lettera chiamata (fase 4): segnale di richiamo
  function letterCall(letterIndex) {
    init();
    const t = now();
    const freq = 500 + letterIndex * 50;
    for (let i = 0; i < 3; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.1);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.5, t + i * 0.1 + 0.06);
      gain.gain.setValueAtTime(0, t + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.12, t + i * 0.1 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.08);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.08);
    }
  }

  // Suono avvicinamento (fase 4): whoosh crescente continuo
  function approachHum(progress, letterIndex) {
    init();
    const t = now();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    const freq = 150 + progress * 300 + letterIndex * 30;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.02 + progress * 0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t); osc.stop(t + 0.08);
  }

  // Suono snap (fase 4): impatto brillante
  function letterSnap(letterIndex) {
    init();
    const t = now();
    // Tono principale
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const freq = 600 + letterIndex * 60;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 2, t + 0.05);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.8, t + 0.3);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(t); osc.stop(t + 0.4);

    // Shimmer metallico
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(freq * 3, t);
    osc2.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.2);
    gain2.gain.setValueAtTime(0.06, t);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc2.connect(gain2); gain2.connect(masterGain);
    osc2.start(t); osc2.stop(t + 0.2);

    // Click di impatto
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.005));
    const src = audioCtx.createBufferSource();
    const gain3 = audioCtx.createGain();
    src.buffer = buf;
    gain3.gain.setValueAtTime(0.2, t);
    gain3.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    src.connect(gain3); gain3.connect(masterGain);
    src.start(t); src.stop(t + 0.03);
  }

  // Suono completamento (tutte le lettere agganciate): accordo risonante
  function allSnapped() {
    init();
    const t = now();
    const freqs = [261, 329, 392, 523]; // Do-Mi-Sol-Do alto
    freqs.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.08);
      gain.gain.setValueAtTime(0, t + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.15, t + i * 0.08 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 1.2);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 1.2);
    });
  }

  return { letterPlace, dissolveStart, dissolveStop, dissolveWhoosh, accelHum, stressSpark, lineExplode,
           wallBounce, letterCall, approachHum, letterSnap, allSnapped };
})();

let W, H, cx, cy, maxRadius;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  maxRadius = Math.min(W, H) * 0.42;
}
resize();
window.addEventListener('resize', resize);

const numCircles = 6;

function getRadius(circleIndex) {
  return (circleIndex / numCircles) * maxRadius;
}

const letterDefs = [
  { letter: 'S', circle: 6, side: -1 },
  { letter: 'C', circle: 5, side: -1 },
  { letter: 'R', circle: 4, side: -1 },
  { letter: 'E', circle: 3, side: -1 },
  { letter: 'E', circle: 2, side: -1 },
  { letter: 'N', circle: 1, side: -1 },
  { letter: 'S', circle: 2, side:  1 },
  { letter: 'A', circle: 3, side:  1 },
  { letter: 'V', circle: 4, side:  1 },
  { letter: 'E', circle: 5, side:  1 },
  { letter: 'R', circle: 6, side:  1 },
];

let angle = 0;
const baseRotationSpeed = 0.005;
let currentRotationSpeed = baseRotationSpeed;

const trailLength = 50;
const trails = letterDefs.map(() => []);

const neonColors = [
  '#ff006e', '#00ffcc', '#ffcc00', '#00aaff', '#ff4488',
  '#88ff44', '#ff8800', '#44aaff', '#ff44cc', '#66ffaa', '#ff006e'
];

const particles = [];

class Particle {
  constructor(x, y, color, opts = {}) {
    this.x = x; this.y = y;
    this.vx = opts.vx || (Math.random() - 0.5) * 3;
    this.vy = opts.vy || (Math.random() - 0.5) * 3;
    this.life = 1;
    this.decay = opts.decay || (Math.random() * 0.02 + 0.008);
    this.size = opts.size || (Math.random() * 2.5 + 0.5);
    this.color = color;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.99; this.vy *= 0.99;
    this.life -= this.decay;
    return this.life > 0;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life * 0.7;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ==========================================================
// FASI:
// 0 = posizionamento lettere (cerchi visibili)
// 1 = dissoluzione psichedelica cerchi
// 2 = rotazione normale 10s → accelerazione fino a 3x
// 3 = lettere volano via, rimbalzano 20s
// 4 = ricomposizione: lettere attratte verso posizioni sulla linea
// ==========================================================
let phase = 0;
let placedCount = 0;
let placeTimer = 0;
const placeInterval = 30;

// Dissoluzione
let dissolveProgress = 0;
const dissolveSpeed = 0.008;
let dissolveHue = 0;
const circleFragments = [];

class CircleFragment {
  constructor(x, y) {
    this.x = x; this.y = y;
    const ea = Math.atan2(y - cy, x - cx) + (Math.random() - 0.5) * 0.5;
    const sp = Math.random() * 3 + 1;
    this.vx = Math.cos(ea) * sp; this.vy = Math.sin(ea) * sp;
    this.life = 1; this.decay = Math.random() * 0.01 + 0.005;
    this.size = Math.random() * 3 + 1;
    this.hueOffset = Math.random() * 360;
    this.twinkle = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.98; this.vy *= 0.98;
    this.life -= this.decay; this.twinkle += 0.1;
    return this.life > 0;
  }
  draw(ctx, t) {
    const hue = (this.hueOffset + t * 2) % 360;
    const fl = Math.sin(this.twinkle) * 0.3 + 0.7;
    ctx.save();
    ctx.globalAlpha = this.life * fl * 0.8;
    ctx.fillStyle = `hsl(${hue}, 100%, 65%)`;
    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnCircleFragments() {
  for (let i = 1; i <= numCircles; i++) {
    const r = getRadius(i);
    const n = Math.floor(r * 0.8);
    for (let f = 0; f < n; f++) {
      const a = (f / n) * Math.PI * 2;
      circleFragments.push(new CircleFragment(cx + Math.cos(a) * r, cy + Math.sin(a) * r));
    }
  }
}

// Fase 2
let phase2Timer = 0;
const phase2NormalDuration = 600;
const phase2AccelDuration = 300;
let phase2AccelTimer = 0;

// Fase 3: lettere libere
const freeLetters = [];
let phase3Timer = 0;
const detachedInPhase2 = new Set(); // lettere già volate via durante la fase 2
const phase3Duration = 1200; // 20 secondi a 60fps

// Fase 4: ricomposizione UNA LETTERA ALLA VOLTA
let snappedLetters = [];
let snapFlashes = [];
let currentSnapIndex = 0;       // quale lettera stiamo richiamando (0-10)
let snapLetterTimer = 0;        // timer per ogni singola lettera
const snapLetterDelay = 60;     // frame di pausa tra una lettera e l'altra (~1s)
const snapLetterApproach = 180; // frame per avvicinamento singola lettera (~3s)
let snapPhase = 'waiting';      // 'waiting' | 'calling' | 'approaching' | 'snapped'
let lineAppeared = false;
let phase4Complete = false;
let phase4EndTimer = 0;

class FreeLetter {
  constructor(letter, x, y, vx, vy, color, fontSize, defIndex) {
    this.letter = letter;
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.fontSize = fontSize;
    this.defIndex = defIndex;
    this.rotation = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.15;
    this.trail = [];
    this.trailMax = 25;
    this.bounceFlash = 0;
  }

  getTargetPos() {
    const obj = letterDefs[this.defIndex];
    const r = getRadius(obj.circle);
    const a = obj.side === -1 ? angle + Math.PI : angle;
    const px = cx + Math.cos(a) * r;
    const py = cy + Math.sin(a) * r;
    const perpA = angle + Math.PI / 2;
    const perpD = this.fontSize * 0.7;
    return {
      x: px + Math.cos(perpA) * perpD,
      y: py + Math.sin(perpA) * perpD
    };
  }

  distToTarget() {
    const target = this.getTargetPos();
    const dx = target.x - this.x, dy = target.y - this.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // approachProgress: 0→1 per la lettera attualmente richiamata, -1 = rimbalza libera
  update(approachProgress) {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.trailMax) this.trail.shift();

    const isCalled = approachProgress >= 0;

    if (isCalled) {
      const target = this.getTargetPos();
      const dx = target.x - this.x, dy = target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Easing smooth per l'approccio
      const t = approachProgress;
      const eased = t * t * (3 - 2 * t); // smoothstep

      // Forza e smorzamento crescenti col progresso
      const force = 0.005 + eased * 0.12;
      const damping = 0.96 - eased * 0.12;

      // Hovering quando è vicina ma non ancora alla fine
      if (dist < 50 && t < 0.85) {
        const wobble = Date.now() * 0.003 + this.defIndex * 2;
        const amt = Math.max(0, (50 - dist) * 0.008 * (1 - t));
        this.vx += Math.sin(wobble) * amt;
        this.vy += Math.cos(wobble * 1.3) * amt;
      }

      this.vx += (dx / (dist + 1)) * force;
      this.vy += (dy / (dist + 1)) * force;
      this.vx *= damping;
      this.vy *= damping;

      // Rotazione si allinea a 0
      const rd = 0.97 - eased * 0.05;
      this.rotation *= rd;
      this.rotSpeed *= rd;
    } else {
      // Libera: rimbalza normalmente
      this.vx *= 0.9992;
      this.vy *= 0.9992;
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (speed < 1.5) {
        this.vx = (this.vx / speed) * 1.5;
        this.vy = (this.vy / speed) * 1.5;
      }
    }

    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.rotSpeed;

    if (this.bounceFlash > 0) this.bounceFlash -= 0.05;

    // Rimbalzo sui bordi (disabilitato per lettere quasi arrivate)
    if (!isCalled || approachProgress < 0.7) {
      const m = this.fontSize * 0.6;
      let bounced = false;
      if (this.x - m < 0) { this.x = m; this.vx = Math.abs(this.vx) * 0.95; bounced = true; }
      if (this.x + m > W) { this.x = W - m; this.vx = -Math.abs(this.vx) * 0.95; bounced = true; }
      if (this.y - m < 0) { this.y = m; this.vy = Math.abs(this.vy) * 0.95; bounced = true; }
      if (this.y + m > H) { this.y = H - m; this.vy = -Math.abs(this.vy) * 0.95; bounced = true; }
      if (bounced) {
        this.bounceFlash = 1;
        SFX.wallBounce(this.defIndex);
        this.rotSpeed = -this.rotSpeed + (Math.random() - 0.5) * 0.05;
        for (let s = 0; s < 8; s++) {
          particles.push(new Particle(this.x, this.y, this.color, {
            vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
            decay: 0.03, size: Math.random() * 3 + 1
          }));
        }
      }
    }
  }

  draw(ctx) {
    for (let t = 0; t < this.trail.length; t++) {
      const alpha = (t / this.trail.length) * 0.25;
      const tp = this.trail[t];
      const sz = (t / this.trail.length) * 2.5;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = hexToRGBA(this.color, alpha);
      ctx.fill();
    }
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    if (this.bounceFlash > 0) {
      ctx.beginPath();
      ctx.arc(0, 0, this.fontSize * 1.2, 0, Math.PI * 2);
      ctx.fillStyle = hexToRGBA(this.color, this.bounceFlash * 0.3);
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 30 * this.bounceFlash;
      ctx.fill(); ctx.shadowBlur = 0;
    }
    ctx.font = `bold ${this.fontSize}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(this.letter, 0, 0);
    ctx.shadowBlur = 0;
    ctx.fillStyle = this.color;
    ctx.fillText(this.letter, 0, 0);
    ctx.restore();
  }
}

// Frammenti del segmento
const lineFragments = [];

class LineFragment {
  constructor(x1, y1, x2, y2) {
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const oa = Math.atan2(my - cy, mx - cx) + (Math.random() - 0.5);
    const sp = Math.random() * 4 + 2;
    this.vx = Math.cos(oa) * sp; this.vy = Math.sin(oa) * sp;
    this.rot = 0; this.rotSpeed = (Math.random() - 0.5) * 0.1;
    this.life = 1; this.decay = Math.random() * 0.008 + 0.004;
    this.len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    this.origAngle = Math.atan2(y2 - y1, x2 - x1);
    this.cx = mx; this.cy = my;
  }
  update() {
    this.cx += this.vx; this.cy += this.vy;
    this.vx *= 0.98; this.vy *= 0.98;
    this.rot += this.rotSpeed; this.life -= this.decay;
    return this.life > 0;
  }
  draw(ctx) {
    const a = this.origAngle + this.rot, hl = this.len / 2;
    ctx.save();
    ctx.globalAlpha = this.life * 0.6;
    ctx.beginPath();
    ctx.moveTo(this.cx + Math.cos(a) * hl, this.cy + Math.sin(a) * hl);
    ctx.lineTo(this.cx - Math.cos(a) * hl, this.cy - Math.sin(a) * hl);
    ctx.strokeStyle = `rgba(120, 180, 255, ${this.life})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(100, 170, 255, 0.5)';
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.restore();
  }
}

// =====================
// FUNZIONI DISEGNO
// =====================
function drawCircles(opacity) {
  if (opacity <= 0) return;
  for (let i = 1; i <= numCircles; i++) {
    const r = getRadius(i);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    if (phase === 1) {
      const hue = (dissolveHue + i * 60) % 360;
      const pulse = Math.sin(dissolveProgress * Math.PI * 4 + i) * 0.5 + 0.5;
      ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${opacity * pulse})`;
      ctx.lineWidth = 2 + Math.sin(dissolveProgress * Math.PI * 6 + i * 2) * 2;
      ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
      ctx.shadowBlur = 15 + pulse * 15;
    } else {
      ctx.strokeStyle = `rgba(60, 100, 180, ${(0.08 + i * 0.03) * opacity})`;
      ctx.lineWidth = 1.5; ctx.shadowBlur = 0;
    }
    ctx.setLineDash([4, 8]); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur = 0;
  }
}

function drawLine(opacity) {
  if (opacity <= 0) return;
  const outerR = getRadius(numCircles) + 40;
  const x1 = cx + Math.cos(angle) * outerR, y1 = cy + Math.sin(angle) * outerR;
  const x2 = cx + Math.cos(angle + Math.PI) * outerR, y2 = cy + Math.sin(angle + Math.PI) * outerR;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(80, 150, 255, ${0.12 * opacity})`;
  ctx.lineWidth = 5;
  ctx.shadowColor = `rgba(80, 150, 255, ${0.4 * opacity})`;
  ctx.shadowBlur = 12; ctx.stroke(); ctx.restore();
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(100, 170, 255, ${0.2 * opacity})`;
  ctx.lineWidth = 1; ctx.stroke();
}

function drawLineShaking(opacity, shake) {
  if (opacity <= 0) return;
  const outerR = getRadius(numCircles) + 40;
  const sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
  const x1 = cx + Math.cos(angle) * outerR + sx, y1 = cy + Math.sin(angle) * outerR + sy;
  const x2 = cx + Math.cos(angle + Math.PI) * outerR + sx, y2 = cy + Math.sin(angle + Math.PI) * outerR + sy;
  const hf = Math.min(1, shake / 12);
  const r = Math.floor(80 + hf * 175), g = Math.floor(150 - hf * 80), b = Math.floor(255 - hf * 155);
  ctx.save();
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(${r},${g},${b},${0.15 * opacity})`;
  ctx.lineWidth = 5 + shake * 0.3;
  ctx.shadowColor = `rgba(${r},${g},${b},${0.5 * opacity})`;
  ctx.shadowBlur = 12 + shake * 2; ctx.stroke(); ctx.restore();
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(${r},${g + 20},${b + 20},${0.25 * opacity})`;
  ctx.lineWidth = 1.5; ctx.stroke();
}

function getLetterPosition(obj) {
  const r = getRadius(obj.circle);
  const a = obj.side === -1 ? angle + Math.PI : angle;
  return { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r };
}

function drawLettersOnLine(showTrails, skipSet = null) {
  const count = phase === 0 ? placedCount : letterDefs.length;
  for (let i = 0; i < count; i++) {
    if (skipSet && skipSet.has(i)) continue;
    const obj = letterDefs[i], pos = getLetterPosition(obj);
    trails[i].push({ x: pos.x, y: pos.y });
    if (trails[i].length > trailLength) trails[i].shift();
    if (showTrails) {
      for (let t = 0; t < trails[i].length - 1; t++) {
        const alpha = (t / trails[i].length) * 0.3;
        const tp = trails[i][t], sz = (t / trails[i].length) * 2;
        ctx.beginPath(); ctx.arc(tp.x, tp.y, sz, 0, Math.PI * 2);
        ctx.fillStyle = hexToRGBA(neonColors[i], alpha); ctx.fill();
      }
    }
    ctx.save();
    ctx.beginPath(); ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = neonColors[i]; ctx.shadowColor = neonColors[i];
    ctx.shadowBlur = 15; ctx.fill(); ctx.restore();
    if (showTrails && Math.random() < 0.1)
      particles.push(new Particle(pos.x, pos.y, neonColors[i]));
    const bfs = Math.min(W, H) < 600 ? 14 : 20;
    const fs = bfs + (obj.circle / numCircles) * (bfs * 0.7);
    ctx.font = `bold ${fs}px 'Courier New', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const pa = angle + Math.PI / 2, pd = fs * 0.7;
    const lx = pos.x + Math.cos(pa) * pd, ly = pos.y + Math.sin(pa) * pd;
    ctx.save(); ctx.shadowColor = neonColors[i]; ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff'; ctx.fillText(obj.letter, lx, ly); ctx.restore();
    ctx.fillStyle = neonColors[i]; ctx.fillText(obj.letter, lx, ly);
    if (phase === 0 && i === placedCount - 1) {
      ctx.save(); ctx.beginPath(); ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
      ctx.fillStyle = hexToRGBA(neonColors[i], 0.25);
      ctx.shadowColor = neonColors[i]; ctx.shadowBlur = 35;
      ctx.fill(); ctx.restore();
      for (let s = 0; s < 4; s++) particles.push(new Particle(pos.x, pos.y, neonColors[i]));
    }
  }
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update()) particles.splice(i, 1);
    else particles[i].draw(ctx);
  }
}
function drawCircleFragments(t) {
  for (let i = circleFragments.length - 1; i >= 0; i--) {
    if (!circleFragments[i].update()) circleFragments.splice(i, 1);
    else circleFragments[i].draw(ctx, t);
  }
}
function drawLineFragments() {
  for (let i = lineFragments.length - 1; i >= 0; i--) {
    if (!lineFragments[i].update()) lineFragments.splice(i, 1);
    else lineFragments[i].draw(ctx);
  }
}
function drawFreeLettersBouncig() {
  for (const fl of freeLetters) { fl.update(-1); fl.draw(ctx); }
}

function hexToRGBA(hex, alpha) {
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${alpha})`;
}

// Stacca una singola lettera dalla linea e la manda a rimbalzare
function releaseOneLetter(defIndex) {
  const obj = letterDefs[defIndex];
  const pos = getLetterPosition(obj);
  const ra = obj.side === -1 ? angle + Math.PI : angle;
  const ta = ra + Math.PI / 2;
  const r = getRadius(obj.circle);
  const ts = currentRotationSpeed * r * 1.8;
  const cs = currentRotationSpeed * r * 0.6;
  const vx = Math.cos(ta) * ts + Math.cos(ra) * cs;
  const vy = Math.sin(ta) * ts + Math.sin(ra) * cs;
  const bfs = Math.min(W, H) < 600 ? 14 : 20;
  const fs = bfs + (obj.circle / numCircles) * (bfs * 0.7);
  freeLetters.push(new FreeLetter(obj.letter, pos.x, pos.y, vx, vy, neonColors[defIndex], fs, defIndex));
  detachedInPhase2.add(defIndex);
  for (let s = 0; s < 12; s++)
    particles.push(new Particle(pos.x, pos.y, neonColors[defIndex], {
      vx: vx * 0.3 + (Math.random() - 0.5) * 5,
      vy: vy * 0.3 + (Math.random() - 0.5) * 5,
      decay: 0.02, size: Math.random() * 3 + 1
    }));
  SFX.stressSpark();
}

// Spezza la linea visiva (solo frammenti e particelle, senza lettere)
function breakLine() {
  const outerR = getRadius(numCircles) + 40;
  for (let s = 0; s < 15; s++) {
    const t1 = s / 15, t2 = (s + 1) / 15;
    lineFragments.push(new LineFragment(
      cx + Math.cos(angle + Math.PI) * outerR * (1 - t1 * 2),
      cy + Math.sin(angle + Math.PI) * outerR * (1 - t1 * 2),
      cx + Math.cos(angle + Math.PI) * outerR * (1 - t2 * 2),
      cy + Math.sin(angle + Math.PI) * outerR * (1 - t2 * 2)
    ));
  }
  for (let s = 0; s < 40; s++)
    particles.push(new Particle(cx, cy, '#ffffff', {
      vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, decay: 0.015, size: Math.random()*3+1
    }));
}

// (snap individuale gestito direttamente in fase 4)

// =====================
// LOOP PRINCIPALE
// =====================
let frameCount = 0;

function animate() {
  frameCount++;
  const t = frameCount;

  // Sfondo
  if (phase >= 2) {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
    ctx.fillRect(0, 0, W, H);
  }

  // ========== FASE 0: posizionamento ==========
  if (phase === 0) {
    drawCircles(1); drawLine(1);
    drawLettersOnLine(false);
    drawParticles();
    placeTimer++;
    if (placeTimer >= placeInterval && placedCount < letterDefs.length) { SFX.letterPlace(placedCount); placedCount++; placeTimer = 0; }
    if (placedCount >= letterDefs.length) {
      placeTimer++;
      if (placeTimer > 80) { phase = 1; dissolveProgress = 0; spawnCircleFragments(); SFX.dissolveStart(); }
    }
  }

  // ========== FASE 1: dissoluzione ==========
  else if (phase === 1) {
    dissolveProgress += dissolveSpeed; dissolveHue += 3;
    if (frameCount % 20 === 0) SFX.dissolveWhoosh(dissolveProgress);
    drawCircles(Math.max(0, 1 - dissolveProgress * 1.2));
    drawLine(Math.max(0, 1 - dissolveProgress * 0.8));
    drawCircleFragments(t);
    drawLettersOnLine(false);
    drawParticles();
    if (dissolveProgress < 0.7 && frameCount % 8 === 0) {
      ctx.save(); ctx.globalAlpha = 0.03 + Math.random() * 0.04;
      ctx.fillStyle = `hsl(${(dissolveHue + Math.random()*120)%360}, 100%, 50%)`;
      ctx.fillRect(0, 0, W, H); ctx.restore();
    }
    if (dissolveProgress > 0.1 && dissolveProgress < 0.6) {
      const wR = dissolveProgress * maxRadius * 2.5;
      ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, wR, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${dissolveHue}, 100%, 70%, ${Math.max(0, 0.3-dissolveProgress*0.5)})`;
      ctx.lineWidth = 3; ctx.shadowColor = `hsl(${dissolveHue}, 100%, 60%)`;
      ctx.shadowBlur = 20; ctx.stroke(); ctx.restore();
    }
    if (dissolveProgress >= 1.3) {
      SFX.dissolveStop();
      phase = 2; phase2Timer = 0; phase2AccelTimer = 0;
      currentRotationSpeed = baseRotationSpeed;
      detachedInPhase2.clear();
      circleFragments.length = 0; trails.forEach(t => t.length = 0);
    }
  }

  // ========== FASE 2: rotazione + accelerazione ==========
  else if (phase === 2) {
    phase2Timer++;
    if (phase2Timer <= phase2NormalDuration) {
      currentRotationSpeed = baseRotationSpeed;
      angle += currentRotationSpeed;
      if (angle > Math.PI * 2) angle -= Math.PI * 2;
      drawLine(1); drawLettersOnLine(true); drawParticles();
    } else {
      phase2AccelTimer++;
      const ap = Math.min(1, phase2AccelTimer / phase2AccelDuration);
      const eased = ap * ap;
      // Velocità max = 9x base → garantisce il distacco di tutte le lettere (anche il cerchio 1)
      currentRotationSpeed = baseRotationSpeed * (1 + eased * 8);
      const shake = eased * 14;
      if (frameCount % 10 === 0 && eased > 0.1) SFX.accelHum(eased);
      angle += currentRotationSpeed;
      if (angle > Math.PI * 2) angle -= Math.PI * 2;

      // Controllo velocità periferica per ogni lettera ancora sulla linea:
      // v_periferica = ω × r; distacco quando supera la soglia
      const threshold = maxRadius * baseRotationSpeed * 1.3;
      for (let i = 0; i < letterDefs.length; i++) {
        if (detachedInPhase2.has(i)) continue;
        if (currentRotationSpeed * getRadius(letterDefs[i].circle) > threshold) {
          releaseOneLetter(i);
        }
      }

      if (eased > 0.3 && Math.random() < eased * 0.4) {
        const sr = Math.random() * getRadius(numCircles);
        const sa = angle + (Math.random() > 0.5 ? 0 : Math.PI);
        particles.push(new Particle(cx+Math.cos(sa)*sr, cy+Math.sin(sa)*sr, '#ffaa44', {
          vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, decay: 0.03, size: Math.random()*2+1
        }));
        if (Math.random() < 0.3) SFX.stressSpark();
      }
      if (eased > 0.5) {
        ctx.save(); ctx.globalAlpha = (eased-0.5)*0.04;
        ctx.fillStyle = '#ff2200'; ctx.fillRect(0,0,W,H); ctx.restore();
      }

      // Disegna linea e lettere ancora aggrappate
      if (detachedInPhase2.size < letterDefs.length) {
        drawLineShaking(1, shake);
        drawLettersOnLine(true, detachedInPhase2);
      }
      // Disegna le lettere già libere che rimbalzano sullo sfondo
      for (const fl of freeLetters) { fl.update(-1); fl.draw(ctx); }
      drawParticles();

      // Quando tutte le lettere si sono staccate → rompi la linea e vai a fase 3
      if (detachedInPhase2.size >= letterDefs.length) {
        SFX.lineExplode();
        breakLine();
        // Riordina per defIndex in modo che la fase 4 funzioni correttamente
        freeLetters.sort((a, b) => a.defIndex - b.defIndex);
        phase = 3;
        phase3Timer = 0;
      }
    }
  }

  // ========== FASE 3: rimbalzo 20 secondi ==========
  else if (phase === 3) {
    phase3Timer++;
    drawLineFragments();
    drawFreeLettersBouncig();
    drawParticles();

    // Dopo 20 secondi → fase 4 ricomposizione una lettera alla volta
    if (phase3Timer >= phase3Duration) {
      phase = 4;
      snappedLetters = [];
      snapFlashes = [];
      currentSnapIndex = 0;
      snapLetterTimer = 0;
      snapPhase = 'waiting';
      lineAppeared = false;
      phase4Complete = false;
      currentRotationSpeed = baseRotationSpeed;
    }
  }

  // ========== FASE 4: ricomposizione UNA LETTERA ALLA VOLTA ==========
  else if (phase === 4) {
    // La linea ruota lentamente
    angle += currentRotationSpeed;
    if (angle > Math.PI * 2) angle -= Math.PI * 2;

    // La linea appare gradualmente nei primi frame
    if (!lineAppeared) {
      snapLetterTimer++;
      const lineOpacity = Math.min(1, snapLetterTimer / 90);
      drawLine(lineOpacity);
      // Le lettere continuano a rimbalzare
      for (let i = 0; i < freeLetters.length; i++) {
        if (!snappedLetters.includes(i)) { freeLetters[i].update(-1); freeLetters[i].draw(ctx); }
      }
      drawParticles();
      if (snapLetterTimer >= 90) { lineAppeared = true; snapLetterTimer = 0; snapPhase = 'waiting'; }
    } else {

      // === MACCHINA A STATI PER OGNI LETTERA ===
      drawLine(1);

      if (currentSnapIndex < freeLetters.length) {
        const calledFL = freeLetters[currentSnapIndex];

        if (snapPhase === 'waiting') {
          // Pausa tra una lettera e l'altra
          snapLetterTimer++;
          if (snapLetterTimer >= snapLetterDelay) {
            snapPhase = 'calling';
            snapLetterTimer = 0;
            SFX.letterCall(currentSnapIndex);
          }
        }

        else if (snapPhase === 'calling') {
          // La lettera viene "chiamata": linea tratteggiata lampeggia
          snapLetterTimer++;
          if (snapLetterTimer >= 40) {
            snapPhase = 'approaching';
            snapLetterTimer = 0;
          }
        }

        else if (snapPhase === 'approaching') {
          // Avvicinamento graduale
          snapLetterTimer++;
          const progress = Math.min(1, snapLetterTimer / snapLetterApproach);
          calledFL.update(progress);

          // Suono di avvicinamento
          if (snapLetterTimer % 8 === 0) SFX.approachHum(progress, currentSnapIndex);

          // Scintille lungo il percorso
          if (Math.random() < 0.3) {
            const target = calledFL.getTargetPos();
            const t4 = Math.random();
            particles.push(new Particle(
              calledFL.x + (target.x - calledFL.x) * t4,
              calledFL.y + (target.y - calledFL.y) * t4,
              calledFL.color, {
                vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5,
                decay: 0.03, size: Math.random()*2+0.5
              }
            ));
          }

          // Snap quando è vicina abbastanza o tempo scaduto
          const dist = calledFL.distToTarget();
          if (dist < 8 || progress >= 1) {
            // SNAP!
            SFX.letterSnap(currentSnapIndex);
            snappedLetters.push(currentSnapIndex);
            const target = calledFL.getTargetPos();
            snapFlashes.push({ x: target.x, y: target.y, color: calledFL.color, life: 1 });
            // Burst generoso di scintille
            for (let s = 0; s < 20; s++) {
              particles.push(new Particle(target.x, target.y, calledFL.color, {
                vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
                decay: 0.018, size: Math.random()*3+0.5
              }));
            }
            snapPhase = 'waiting';
            snapLetterTimer = 0;
            currentSnapIndex++;
          }
        }

        // Disegna linea tratteggiata dalla lettera chiamata al suo target
        if (snapPhase === 'calling' || snapPhase === 'approaching') {
          const target = calledFL.getTargetPos();
          const dist = calledFL.distToTarget();
          const closeness = Math.max(0, 1 - dist / (maxRadius * 2));
          // Linea tratteggiata
          ctx.save();
          ctx.globalAlpha = 0.15 + closeness * 0.25;
          ctx.beginPath();
          ctx.moveTo(calledFL.x, calledFL.y);
          ctx.lineTo(target.x, target.y);
          ctx.strokeStyle = calledFL.color;
          ctx.lineWidth = 0.8 + closeness;
          ctx.setLineDash([3, 5]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();

          // Pulsazione target
          if (dist < 60) {
            const pa = Math.sin(Date.now() * 0.006) * 0.2 + 0.2;
            ctx.save();
            ctx.beginPath();
            ctx.arc(target.x, target.y, 12 + (1 - closeness) * 8, 0, Math.PI * 2);
            ctx.fillStyle = hexToRGBA(calledFL.color, pa);
            ctx.shadowColor = calledFL.color;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.restore();
          }
        }
      }

      // Aggiorna e disegna lettere libere (non agganciate e non in fase di richiamo)
      for (let i = 0; i < freeLetters.length; i++) {
        if (snappedLetters.includes(i)) continue;
        if (i === currentSnapIndex && (snapPhase === 'approaching' || snapPhase === 'calling')) {
          // Questa è la lettera chiamata — già aggiornata sopra se approaching
          if (snapPhase === 'calling') freeLetters[i].update(-1); // ancora rimbalza durante 'calling'
          freeLetters[i].draw(ctx);
        } else if (i > currentSnapIndex || (i === currentSnapIndex && snapPhase === 'waiting')) {
          // Lettere non ancora chiamate: rimbalzano liberamente
          freeLetters[i].update(-1);
          freeLetters[i].draw(ctx);
        }
      }

      // Disegna lettere già agganciate nella posizione esatta sulla linea
      for (const si of snappedLetters) {
        const obj = letterDefs[si];
        const pos = getLetterPosition(obj);
        const fl = freeLetters[si];
        const bfs = Math.min(W, H) < 600 ? 14 : 20;
        const fs = bfs + (obj.circle / numCircles) * (bfs * 0.7);
        const pa = angle + Math.PI / 2, pd = fs * 0.7;
        const lx = pos.x + Math.cos(pa) * pd, ly = pos.y + Math.sin(pa) * pd;

        ctx.save();
        ctx.beginPath(); ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = fl.color; ctx.shadowColor = fl.color;
        ctx.shadowBlur = 15; ctx.fill(); ctx.restore();

        ctx.font = `bold ${fs}px 'Courier New', monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.save(); ctx.shadowColor = fl.color; ctx.shadowBlur = 20;
        ctx.fillStyle = '#ffffff'; ctx.fillText(fl.letter, lx, ly); ctx.restore();
        ctx.fillStyle = fl.color; ctx.fillText(fl.letter, lx, ly);
      }
    }

    // Disegna snap flashes
    for (let i = snapFlashes.length - 1; i >= 0; i--) {
      const sf = snapFlashes[i];
      sf.life -= 0.015;
      if (sf.life <= 0) { snapFlashes.splice(i, 1); continue; }
      ctx.save();
      ctx.beginPath();
      ctx.arc(sf.x, sf.y, 25 * sf.life, 0, Math.PI * 2);
      ctx.fillStyle = hexToRGBA(sf.color, sf.life * 0.35);
      ctx.shadowColor = sf.color;
      ctx.shadowBlur = 30 * sf.life;
      ctx.fill();
      ctx.restore();
    }

    drawParticles();

    // Tutte agganciate → aspetta flash poi torna a fase 2
    if (snappedLetters.length >= freeLetters.length && snapFlashes.length === 0) {
      if (!phase4Complete) {
        SFX.allSnapped();
        phase4Complete = true;
        phase4EndTimer = 0;
      }
      phase4EndTimer++;
      // Aspetta ~2 secondi per l'accordo finale poi torna a fase 2
      if (phase4EndTimer >= 120) {
        freeLetters.length = 0;
        trails.forEach(t => t.length = 0);
        phase = 2;
        phase2Timer = 0;
        phase2AccelTimer = 0;
        currentRotationSpeed = baseRotationSpeed;
        detachedInPhase2.clear();
      }
    }
  }

  requestAnimationFrame(animate);
}

// Schermata iniziale: richiede click per sbloccare AudioContext
function drawStartScreen() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Testo pulsante
  const pulse = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.font = `bold ${Math.min(W, H) < 600 ? 18 : 28}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 20;
  ctx.fillText('▶  CLICCA PER AVVIARE  ▶', cx, cy);
  ctx.restore();

  // Cerchi decorativi
  ctx.save();
  ctx.globalAlpha = 0.08;
  for (let i = 1; i <= 6; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, (i / 6) * maxRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsl(${(Date.now() * 0.05 + i * 60) % 360}, 100%, 60%)`;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();

  if (!started) requestAnimationFrame(drawStartScreen);
}

let started = false;
drawStartScreen();

function startAll(e) {
  if (started) return;
  started = true;
  // Inizializza AudioContext con il gesto utente
  SFX.letterPlace(0); // primo suono = sblocco AudioContext
  // Ferma il loop della schermata iniziale e avvia l'animazione
  setTimeout(() => {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);
    animate();
  }, 50);
  document.removeEventListener('click', startAll);
  document.removeEventListener('touchstart', startAll);
  document.removeEventListener('keydown', startAll);
}

document.addEventListener('click', startAll);
document.addEventListener('touchstart', startAll);
document.addEventListener('keydown', startAll);
</script>
</body>
</html>
