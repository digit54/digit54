<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Allena la Memoria</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 10px 24px;
            color: white;
        }

        h1 {
            font-size: 1.45rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* ── Stats ─────────────────────────────────────────────── */
        .stats {
            display: flex;
            gap: 6px;
            width: 100%;
            max-width: 370px;
            margin-bottom: 10px;
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            padding: 6px 4px;
            text-align: center;
        }

        .stat-label { font-size: 0.52rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        .stat-value { font-size: 1.2rem; font-weight: 700; display: block; }
        #v-giusti    { color: #2ecc71; }
        #v-sbagliati { color: #e74c3c; }
        #v-timer     { color: #f39c12; }

        /* ── Timer slider ───────────────────────────────────────── */
        .timer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 7px 14px;
            margin-bottom: 8px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100px; height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 4px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: #3498db;
            border-radius: 50%;
            cursor: pointer;
        }

        #sec-lbl { font-weight: 700; color: #3498db; min-width: 22px; }

        /* ── Timer bar ──────────────────────────────────────────── */
        #tbar-wrap {
            width: 100%; max-width: 370px;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-bottom: 8px;
            display: none;
            overflow: hidden;
        }
        #tbar {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f39c12, #f1c40f);
            border-radius: 5px;
            transition: width 0.1s linear;
        }

        /* ── Message ────────────────────────────────────────────── */
        #msg {
            font-size: 0.83rem;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 14px;
            padding: 7px 14px;
            margin-bottom: 10px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 370px;
            width: 100%;
        }

        /* ── Two grids ──────────────────────────────────────────── */
        .grids-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .grid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .grid-lbl {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.65;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 40px);
            grid-template-rows:    repeat(4, 40px);
            gap: 5px;
        }

        /* ── Cell base ──────────────────────────────────────────── */
        .cell {
            width: 40px; height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(200,220,255,0.06);
            color: transparent;
            cursor: default;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            user-select: none;
            touch-action: manipulation;
        }

        /* Showing: numero giallo */
        .cell.show-num {
            background: #f1c40f;
            color: #1a1a2e;
            border-color: #c9a800;
            box-shadow: 0 0 10px rgba(241,196,15,0.5);
        }

        /* Easy mode hint: cella azzurrina, nessun numero */
        .cell.hint {
            background: rgba(173, 216, 230, 0.45);
            border-color: #f1c40f;
            color: transparent;
            cursor: pointer;
        }

        /* Hard mode: celle cliccabili ma visivamente uguali alle celle vuote */
        .cell.clickable {
            background: rgba(200,220,255,0.06);
            border-color: #f1c40f;
            color: transparent;
            cursor: pointer;
        }

        /* Hover e active solo per celle interattive */
        .cell.hint:hover    { filter: brightness(1.3); }
        .cell.hint:active   { transform: scale(0.87); }
        .cell.clickable:active { transform: scale(0.87); }
        .cell.user-val:active { transform: scale(0.87); }

        /* Cella con valore utente */
        .cell.user-val {
            color: white;
            cursor: pointer;
        }

        /* Cella selezionata */
        .cell.selected {
            border-color: #3498db !important;
            box-shadow: 0 0 0 2px rgba(52,152,219,0.65) !important;
        }

        /* ── Risultato ─────────────────────────────────────────── */
        .cell.res-ok {
            background: #27ae60;
            color: white;
            border-color: #1e8449;
            box-shadow: 0 2px 8px rgba(39,174,96,0.4);
            cursor: default;
        }

        .cell.res-err {
            background: #e74c3c;
            color: white;
            border-color: #a93226;
            box-shadow: 0 2px 8px rgba(231,76,60,0.4);
            cursor: default;
        }

        /* Griglia destra: numero corretto (giallo come in showing) */
        .cell.ans-num {
            background: #f1c40f;
            color: #1a1a2e;
            border-color: #c9a800;
            box-shadow: 0 0 8px rgba(241,196,15,0.4);
            cursor: default;
        }

        /* Griglia destra: cella vuota (risultato) */
        .cell.ans-empty {
            background: rgba(200,220,255,0.06);
            color: transparent;
            border-color: rgba(255,255,255,0.06);
            cursor: default;
        }

        /* ── Numpad ─────────────────────────────────────────────── */
        #numpad {
            display: none;
            gap: 7px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 10px 14px;
            align-items: center;
        }

        #numpad button {
            width: 42px; height: 42px;
            border-radius: 50%;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #numpad button:active { transform: scale(0.87); }

        .np-n { background: #3498db; color: white; box-shadow: 0 2px 8px rgba(52,152,219,0.4); }
        .np-d { background: #e74c3c; color: white; box-shadow: 0 2px 8px rgba(231,76,60,0.3); }

        /* ── Action buttons ─────────────────────────────────────── */
        .btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 370px;
            width: 100%;
        }

        .btns button {
            padding: 12px 18px;
            border: none;
            border-radius: 22px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.12s;
            min-width: 96px;
        }
        .btns button:active  { transform: scale(0.92); }
        .btns button:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

        .btn-go    { background: linear-gradient(135deg,#219a52,#2ecc71); color:white; box-shadow:0 3px 12px rgba(46,204,113,.4); }
        .btn-hard  { background: linear-gradient(135deg,#ba4a00,#e67e22); color:white; box-shadow:0 3px 12px rgba(230,126,34,.4); }
        .btn-check { background: linear-gradient(135deg,#1a6fa0,#3498db); color:white; box-shadow:0 3px 12px rgba(52,152,219,.4); }
        .btn-reset { background: linear-gradient(135deg,#4d5d6e,#7f8c8d); color:white; }
        .btn-help  { background: linear-gradient(135deg,#6c3483,#9b59b6); color:white; box-shadow:0 3px 12px rgba(155,89,182,.4); }

        /* Very small screens: shrink cells to fit both grids */
        @media (max-width: 395px) {
            .grid { grid-template-columns:repeat(4,36px); grid-template-rows:repeat(4,36px); gap:4px; }
            .cell { width:36px; height:36px; font-size:1.1rem; }
            .grids-wrap { gap:6px; }
        }

        /* Larger screens: bigger cells */
        @media (min-width: 420px) {
            .grid { grid-template-columns:repeat(4,46px); grid-template-rows:repeat(4,46px); gap:6px; }
            .cell { width:46px; height:46px; font-size:1.45rem; }
            .grids-wrap { gap:14px; }
        }

        /* ── Hover dropdown ─────────────────────────────────────── */
        #cell-dropdown {
            position: fixed;
            display: none;
            flex-direction: row;
            background: rgba(14, 24, 55, 0.97);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 12px;
            padding: 5px 6px;
            gap: 5px;
            z-index: 1000;
            box-shadow: 0 6px 24px rgba(0,0,0,0.55);
            pointer-events: auto;
        }

        #cell-dropdown button {
            width: 34px; height: 34px;
            border-radius: 8px;
            border: none;
            background: #3498db;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.12s, transform 0.1s;
        }
        #cell-dropdown button:hover { background: #2471a3; transform: scale(1.12); }
        #cell-dropdown button:active { transform: scale(0.9); }
        #cell-dropdown .dd-del { background: #e74c3c; }
        #cell-dropdown .dd-del:hover { background: #b03a2e; }

        /* Touch screens: bigger dropdown buttons, hide numpad (dropdown replaces it) */
        @media (pointer: coarse) {
            #cell-dropdown button { width: 46px; height: 46px; font-size: 1.2rem; }
            #cell-dropdown { padding: 7px 9px; gap: 7px; }
            #numpad { display: none !important; }
        }
    </style>
</head>
<body>

<h1>🧠 Allena la Memoria</h1>

<!-- Stats -->
<div class="stats">
    <div class="stat-box"><span class="stat-label">N° Prove</span><span class="stat-value" id="v-prove">0</span></div>
    <div class="stat-box"><span class="stat-label">Giusti</span><span class="stat-value" id="v-giusti">0</span></div>
    <div class="stat-box"><span class="stat-label">Sbagliati</span><span class="stat-value" id="v-sbagliati">0</span></div>
    <div class="stat-box"><span class="stat-label">Secondi</span><span class="stat-value" id="v-timer">—</span></div>
</div>

<!-- Timer slider -->
<div class="timer-row">
    <span>⏱ Tempo:</span>
    <input type="range" id="sec-slider" min="1" max="10" value="3"
           oninput="document.getElementById('sec-lbl').textContent=this.value+'s'">
    <span id="sec-lbl">3s</span>
</div>

<!-- Timer progress bar -->
<div id="tbar-wrap"><div id="tbar" style="width:100%"></div></div>

<!-- Message -->
<div id="msg">Premi "Avvia" per iniziare!</div>

<!-- Two grids -->
<div class="grids-wrap">
    <!-- Left: user input -->
    <div class="grid-section">
        <div class="grid-lbl">La tua risposta</div>
        <div class="grid" id="lg"></div>
    </div>
    <!-- Right: correct answer (revealed on check) -->
    <div class="grid-section">
        <div class="grid-lbl" id="rg-lbl">Risposta corretta</div>
        <div class="grid" id="rg"></div>
    </div>
</div>

<!-- Numpad (visible during input phase) -->
<div id="numpad">
    <button class="np-n" onclick="inputNum(1)">1</button>
    <button class="np-n" onclick="inputNum(2)">2</button>
    <button class="np-n" onclick="inputNum(3)">3</button>
    <button class="np-n" onclick="inputNum(4)">4</button>
    <button class="np-n" onclick="inputNum(5)">5</button>
    <button class="np-d" onclick="inputNum(null)">✕</button>
</div>

<!-- Hover cell dropdown -->
<div id="cell-dropdown">
    <button onclick="ddInputNum(1)">1</button>
    <button onclick="ddInputNum(2)">2</button>
    <button onclick="ddInputNum(3)">3</button>
    <button onclick="ddInputNum(4)">4</button>
    <button onclick="ddInputNum(5)">5</button>
    <button class="dd-del" onclick="ddInputNum(null)">✕</button>
</div>

<!-- Buttons -->
<div class="btns">
    <button class="btn-go"    id="btn-av" onclick="avvia(false)">▶ Facile</button>
    <button class="btn-hard"  id="btn-hd" onclick="avvia(true)" >⚡ Difficile</button>
    <button class="btn-check" id="btn-ck" onclick="controlla()" disabled>✓ Controlla</button>
    <button class="btn-help"  id="btn-ai" onclick="aiuto()"     disabled>👁 Aiuto</button>
    <button class="btn-reset" id="btn-rs" onclick="resetGame()">↺ Reset</button>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const CELLS = 16;   // 4 × 4
const N     = 5;    // numeri da piazzare (1–5)

// ─── State ────────────────────────────────────────────────────────────────────
let phase       = 'idle';              // idle | showing | input | result
let hardMode    = false;
let pattern     = new Array(CELLS).fill(null); // schema corretto
let userInput   = new Array(CELLS).fill(null); // risposta utente
let hintMask    = new Array(CELLS).fill(false);// celle azzurre (easy)
let selIdx      = -1;                  // cella selezionata nella griglia sx
let timerHandle = null;

// Statistiche cumulative
let prove = 0, giusti = 0, sbagliati = 0;

// ─── Build grids ──────────────────────────────────────────────────────────────
const lgEl = document.getElementById('lg');
const rgEl = document.getElementById('rg');

for (let i = 0; i < CELLS; i++) {
    const lc = document.createElement('div');
    lc.className = 'cell';
    lc.id = 'L' + i;
    lc.addEventListener('click', () => onLeftClick(i));
    lgEl.appendChild(lc);

    const rc = document.createElement('div');
    rc.className = 'cell';
    rc.id = 'R' + i;
    rgEl.appendChild(rc);
}

function Lc(i) { return document.getElementById('L' + i); }
function Rc(i) { return document.getElementById('R' + i); }

// ─── AVVIA ────────────────────────────────────────────────────────────────────
function avvia(hard) {
    if (phase === 'showing') return;
    stopTimer();

    hardMode  = hard;
    prove++;
    pattern   = new Array(CELLS).fill(null);
    userInput = new Array(CELLS).fill(null);
    hintMask  = new Array(CELLS).fill(false);
    selIdx    = -1;

    // Scegli N posizioni casuali senza duplicati
    const chosen = [];
    while (chosen.length < N) {
        const r = Math.floor(Math.random() * CELLS);
        if (!chosen.includes(r)) chosen.push(r);
    }
    chosen.forEach((idx, k) => {
        pattern[idx]  = k + 1;
        hintMask[idx] = true;
    });

    updateStats();
    phase = 'showing';
    renderBoth('showing');
    setMsg('Memorizza la posizione dei numeri!');
    setButtons(false, false, false);
    showNumpad(false);

    // Countdown
    const totalSec = parseInt(document.getElementById('sec-slider').value);
    let remaining  = totalSec;
    document.getElementById('v-timer').textContent = remaining.toFixed(1);
    document.getElementById('tbar-wrap').style.display = 'block';
    document.getElementById('tbar').style.width = '100%';

    timerHandle = setInterval(() => {
        remaining -= 0.1;
        const frac = Math.max(0, remaining / totalSec);
        document.getElementById('tbar').style.width = (frac * 100) + '%';
        document.getElementById('v-timer').textContent = remaining > 0 ? remaining.toFixed(1) : '0.0';

        if (remaining <= 0) {
            stopTimer();
            document.getElementById('tbar-wrap').style.display = 'none';
            document.getElementById('v-timer').textContent = '—';
            beginInput();
        }
    }, 100);
}

// ─── Begin input ──────────────────────────────────────────────────────────────
function beginInput() {
    phase  = 'input';
    selIdx = -1;
    renderBoth('input');

    if (hardMode) {
        setMsg('Modalità difficile: ricorda dove c\'erano i numeri e quali erano!');
    } else {
        setMsg('Le celle azzurre indicano dove c\'erano i numeri — selezionane una e inserisci il numero!');
    }

    setButtons(false, false, false, true);
    showNumpad(false);
}

// ─── Touch device detection ────────────────────────────────────────────────────
function isTouch() { return window.matchMedia('(pointer: coarse)').matches; }

// ─── Click su cella sinistra ──────────────────────────────────────────────────
function onLeftClick(i) {
    if (phase !== 'input') return;

    // In modalità facile solo le celle hint sono selezionabili
    if (!hardMode && !hintMask[i]) return;

    selIdx = i;
    renderBoth('input');

    if (isTouch()) {
        // Su touch: mostra il dropdown vicino alla cella (il numpad è nascosto via CSS)
        showDropdown(i, Lc(i));
        setMsg('Tocca un numero oppure ✕ per cancellare');
    } else {
        showNumpad(true);
        setMsg('Seleziona il numero da inserire, oppure ✕ per cancellare');
    }
}

// ─── Input numero dal numpad ──────────────────────────────────────────────────
function inputNum(n) {
    if (phase !== 'input' || selIdx < 0) return;

    userInput[selIdx] = n;  // null = cancella
    selIdx = -1;
    showNumpad(false);
    renderBoth('input');

    // Conta celle compilate
    const filled = userInput.filter(v => v !== null).length;
    if (filled === N) {
        setMsg('Tutti i numeri inseriti — premi "Controlla" quando sei pronto!');
        document.getElementById('btn-ck').disabled = false;
    } else {
        setMsg(!hardMode
            ? 'Le celle azzurre indicano dove c\'erano i numeri — selezionane una e inserisci il numero!'
            : 'Seleziona una cella e inserisci il numero');
    }
}

// ─── Controlla ────────────────────────────────────────────────────────────────
function controlla() {
    if (phase !== 'input') return;
    phase  = 'result';
    selIdx = -1;
    showNumpad(false);

    let rG = 0, rS = 0;
    for (let i = 0; i < CELLS; i++) {
        const p = pattern[i], u = userInput[i];
        if (p === null && u === null) continue;   // entrambi vuoti → salta
        if (p === u)  rG++;
        else          rS++;
    }
    giusti    += rG;
    sbagliati += rS;
    updateStats();
    renderBoth('result');
    setButtons(true, true, false);

    if (rS === 0 && rG === N) {
        setMsg('🎉 Perfetto! Tutti e ' + N + ' i numeri corretti!');
    } else {
        setMsg(rG + ' giusti · ' + rS + ' sbagliati — vedi la griglia di destra per la risposta corretta');
    }
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetGame() {
    stopTimer();
    phase     = 'idle';
    hardMode  = false;
    pattern   = new Array(CELLS).fill(null);
    userInput = new Array(CELLS).fill(null);
    hintMask  = new Array(CELLS).fill(false);
    selIdx    = -1;
    prove = 0; giusti = 0; sbagliati = 0;
    updateStats();
    renderBoth('idle');
    setMsg('Premi "Avvia" per iniziare!');
    setButtons(true, true, false);
    showNumpad(false);
    document.getElementById('v-timer').textContent = '—';
    document.getElementById('tbar-wrap').style.display = 'none';
}

// ─── Render both grids ────────────────────────────────────────────────────────
function renderBoth(ph) {
    for (let i = 0; i < CELLS; i++) {
        const lc = Lc(i);
        const rc = Rc(i);
        lc.className = 'cell';
        rc.className = 'cell';
        lc.textContent = '';
        rc.textContent = '';

        // ── GRIGLIA SINISTRA ─────────────────────────────────────
        if (ph === 'showing') {
            // Mostra il pattern in giallo
            if (pattern[i] !== null) {
                lc.classList.add('show-num');
                lc.textContent = pattern[i];
            }

        } else if (ph === 'input') {
            if (hardMode) {
                // Difficile: TUTTE le celle identiche visivamente (nessun hint azzurrino)
                lc.classList.add('clickable');
            } else {
                // Facile: solo le celle hint sono azzurrine e cliccabili
                if (hintMask[i]) lc.classList.add('hint');
            }
            if (userInput[i] !== null) {
                lc.classList.add('user-val');
                lc.textContent = userInput[i];
            }
            if (i === selIdx) lc.classList.add('selected');

        } else if (ph === 'result') {
            // Mostra risposta utente colorata
            const p = pattern[i], u = userInput[i];
            if (p !== null || u !== null) {
                if (p === u) {
                    lc.classList.add('res-ok');
                    lc.textContent = u;
                } else {
                    lc.classList.add('res-err');
                    lc.textContent = u !== null ? u : '—';
                }
            }

        } else {
            // idle: celle vuote default
        }

        // ── GRIGLIA DESTRA ───────────────────────────────────────
        if (ph === 'result') {
            // Rivela lo schema corretto
            if (pattern[i] !== null) {
                rc.classList.add('ans-num');
                rc.textContent = pattern[i];
            } else {
                rc.classList.add('ans-empty');
            }
        }
        // In tutte le altre fasi la griglia destra rimane vuota/nascosta
    }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function setMsg(t) { document.getElementById('msg').textContent = t; }

function setButtons(av, hd, ck, ai = false) {
    document.getElementById('btn-av').disabled = !av;
    document.getElementById('btn-hd').disabled = !hd;
    document.getElementById('btn-ck').disabled = !ck;
    document.getElementById('btn-ai').disabled = !ai;
}

function showNumpad(visible) {
    document.getElementById('numpad').style.display = visible ? 'flex' : 'none';
}

function updateStats() {
    document.getElementById('v-prove').textContent    = prove;
    document.getElementById('v-giusti').textContent   = giusti;
    document.getElementById('v-sbagliati').textContent = sbagliati;
}

function stopTimer() {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
}

// ─── Keyboard support (per desktop) ─────────────────────────────────────────

// Celle valide su cui navigare con Enter
function getValidCells() {
    const all = Array.from({length: CELLS}, (_, i) => i);
    return hardMode ? all : all.filter(i => hintMask[i]);
}

// Sposta la selezione alla cella successiva (orizzontale, riga per riga, ciclica)
function advanceCell() {
    const valid = getValidCells();
    if (!valid.length) return;
    const pos     = valid.indexOf(selIdx);
    const nextPos = (pos < 0 ? 0 : pos + 1) % valid.length;
    selIdx = valid[nextPos];
    renderBoth('input');
    showNumpad(true);
}

document.addEventListener('keydown', e => {
    if (phase !== 'input') return;

    // ── Frecce direzionali (modalità difficile) ───────────────────────────────
    if (hardMode && ['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key)) {
        e.preventDefault();
        if (selIdx < 0) {
            selIdx = 0;
        } else {
            const row = Math.floor(selIdx / 4);
            const col = selIdx % 4;
            if (e.key === 'ArrowRight' && col < 3) selIdx = row * 4 + col + 1;
            if (e.key === 'ArrowLeft'  && col > 0) selIdx = row * 4 + col - 1;
            if (e.key === 'ArrowDown'  && row < 3) selIdx = (row + 1) * 4 + col;
            if (e.key === 'ArrowUp'    && row > 0) selIdx = (row - 1) * 4 + col;
        }
        renderBoth('input');
        showNumpad(true);
        return;
    }

    // ── ESC: deseleziona (se non tutti i quadretti sono compilati) ────────────
    if (e.key === 'Escape') {
        const filled = userInput.filter(v => v !== null).length;
        if (filled < N) {
            selIdx = -1;
            renderBoth('input');
            showNumpad(false);
            setMsg(hardMode
                ? 'Modalità difficile: ricorda dove c\'erano i numeri e quali erano!'
                : 'Le celle azzurre indicano dove c\'erano i numeri — selezionane una e inseriscilo!');
        }
        return;
    }

    // ── Digita un numero nella cella selezionata (senza deselezionare) ────────
    if (e.key >= '1' && e.key <= '5') {
        if (selIdx < 0) return;
        userInput[selIdx] = parseInt(e.key);
        renderBoth('input');
        const filled = userInput.filter(v => v !== null).length;
        if (filled === N) {
            setMsg('Tutti i numeri inseriti — premi "Controlla"!');
            document.getElementById('btn-ck').disabled = false;
        }
        return;
    }

    // ── Cancella la cella selezionata ─────────────────────────────────────────
    if (e.key === 'Delete' || e.key === 'Backspace' || e.key === '0') {
        if (selIdx < 0) return;
        userInput[selIdx] = null;
        document.getElementById('btn-ck').disabled = true;
        renderBoth('input');
        return;
    }

    // ── Enter: avanza alla cella successiva (orizzontale, riga per riga, ciclica)
    if (e.key === 'Enter') {
        advanceCell();
    }
});

// ─── Aiuto: mostra la risposta corretta per 1 secondo ─────────────────────────
function aiuto() {
    if (phase !== 'input') return;
    const btn = document.getElementById('btn-ai');
    btn.disabled = true;

    // Rivela il pattern nella griglia destra per 1 secondo
    for (let i = 0; i < CELLS; i++) {
        const rc = Rc(i);
        rc.className = 'cell';
        if (pattern[i] !== null) {
            rc.classList.add('ans-num');
            rc.textContent = pattern[i];
        } else {
            rc.classList.add('ans-empty');
            rc.textContent = '';
        }
    }

    setTimeout(() => {
        // Nasconde di nuovo la griglia destra
        for (let i = 0; i < CELLS; i++) {
            const rc = Rc(i);
            rc.className = 'cell';
            rc.textContent = '';
        }
        if (phase === 'input') btn.disabled = false;
    }, 1000);
}

// ─── Hover dropdown ───────────────────────────────────────────────────────────
const ddEl = document.getElementById('cell-dropdown');
let ddCellIdx   = -1;
let ddHideTm    = null;

function showDropdown(i, cellEl) {
    if (phase !== 'input') return;
    if (!hardMode && !hintMask[i]) return;

    clearTimeout(ddHideTm);
    ddCellIdx = i;
    ddEl.style.display = 'flex';

    const rect = cellEl.getBoundingClientRect();
    const ddW  = 6 * (34 + 5) + 12;   // approx dropdown width
    const ddH  = 44;

    let top  = rect.bottom + 6;
    let left = rect.left + rect.width / 2 - ddW / 2;

    if (top + ddH > window.innerHeight - 4) top = rect.top - ddH - 6;
    if (left < 4) left = 4;
    if (left + ddW > window.innerWidth - 4) left = window.innerWidth - ddW - 4;

    ddEl.style.top  = top  + 'px';
    ddEl.style.left = left + 'px';
}

function hideDropdown() {
    ddHideTm = setTimeout(() => {
        ddEl.style.display = 'none';
        ddCellIdx = -1;
    }, 160);
}

function ddInputNum(n) {
    if (ddCellIdx < 0) return;
    selIdx = ddCellIdx;
    ddEl.style.display = 'none';
    ddCellIdx = -1;
    clearTimeout(ddHideTm);
    inputNum(n);
}

// Attach hover listeners to all left-grid cells (desktop only)
for (let i = 0; i < CELLS; i++) {
    const lc = Lc(i);
    lc.addEventListener('mouseenter', () => { if (!isTouch()) showDropdown(i, lc); });
    lc.addEventListener('mouseleave', () => { if (!isTouch()) hideDropdown(); });
}

// Keep dropdown visible while hovering it (desktop)
ddEl.addEventListener('mouseenter', () => { if (!isTouch()) clearTimeout(ddHideTm); });
ddEl.addEventListener('mouseleave', () => { if (!isTouch()) hideDropdown(); });

// Touch: chiudi il dropdown toccando fuori
document.addEventListener('touchstart', e => {
    if (ddEl.style.display !== 'flex') return;
    if (!ddEl.contains(e.target) && !e.target.closest('#lg')) {
        ddEl.style.display = 'none';
        ddCellIdx = -1;
        selIdx = -1;
        renderBoth('input');
    }
}, { passive: true });

// ─── Init ─────────────────────────────────────────────────────────────────────
renderBoth('idle');
</script>
</body>
</html>
