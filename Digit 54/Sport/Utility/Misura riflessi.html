<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misura Riflessi</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111827;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }

  .card {
    background: #1f2937;
    border-radius: 16px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 360px;
    max-width: 100%;
  }

  h1 {
    color: #f9fafb;
    font-size: 22px;
    margin: 0 0 20px;
  }

  .power-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .power-label {
    color: #d1d5db;
    font-size: 15px;
    font-weight: 600;
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 54px;
    height: 30px;
    flex-shrink: 0;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #4b5563;
    border-radius: 30px;
    transition: background 0.2s ease;
  }

  .slider::before {
    content: "";
    position: absolute;
    height: 24px;
    width: 24px;
    left: 3px;
    top: 3px;
    background: #f9fafb;
    border-radius: 50%;
    transition: transform 0.2s ease;
  }

  .switch input:checked + .slider {
    background: #22c55e;
  }

  .switch input:checked + .slider::before {
    transform: translateX(24px);
  }

  .light {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: #374151;
    border: 6px solid #4b5563;
    transition: background 0.15s ease, box-shadow 0.15s ease;
  }

  .light.red {
    background: #dc2626;
    border-color: #ef4444;
    box-shadow: 0 0 40px 10px rgba(220, 38, 38, 0.7);
  }

  .status {
    color: #9ca3af;
    font-size: 15px;
    min-height: 20px;
    margin-bottom: 16px;
  }

  .timer {
    font-size: 48px;
    font-weight: bold;
    color: #f9fafb;
    font-variant-numeric: tabular-nums;
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 24px;
  }

  button {
    flex: 1;
    min-height: 60px;
    padding: 18px 0;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  button:active {
    transform: scale(0.97);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #startBtn {
    background: #22c55e;
    color: #052e12;
  }

  #stopBtn {
    background: #ef4444;
    color: #2b0505;
  }

  .best-time {
    color: #facc15;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .history {
    text-align: left;
  }

  .history label {
    display: block;
    color: #9ca3af;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .history select {
    width: 100%;
    padding: 12px 10px;
    font-size: 15px;
    background: #111827;
    color: #f9fafb;
    border: 1px solid #374151;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Misura Riflessi</h1>

  <div class="power-row">
    <span class="power-label">Gioco</span>
    <label class="switch">
      <input type="checkbox" id="powerSwitch">
      <span class="slider"></span>
    </label>
  </div>

  <div id="light" class="light"></div>

  <div id="status" class="status">Accendi l'interruttore per iniziare</div>
  <div id="timer" class="timer">00:00.00</div>
  <div id="bestTime" class="best-time">Miglior tempo: --:--.--</div>

  <div class="buttons">
    <button id="startBtn" disabled>Start</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <div class="history">
    <label for="historySelect">Ultime prove</label>
    <select id="historySelect">
      <option>Nessuna prova ancora</option>
    </select>
  </div>
</div>

<script>
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const light = document.getElementById('light');
  const status = document.getElementById('status');
  const timerEl = document.getElementById('timer');
  const powerSwitch = document.getElementById('powerSwitch');
  const historySelect = document.getElementById('historySelect');
  const bestTimeEl = document.getElementById('bestTime');

  const HISTORY_KEY = 'misuraRiflessiHistory';
  const MAX_HISTORY = 5;

  let waitTimeoutId = null;
  let intervalId = null;
  let startTime = null;
  let bestTimeMs = null; // si azzera allo spegnimento del gioco, non persiste tra sessioni

  function formatTime(ms) {
    const totalCentiseconds = Math.floor(ms / 10);
    const seconds = Math.floor(totalCentiseconds / 100);
    const centiseconds = totalCentiseconds % 100;
    const mm = Math.floor(seconds / 60);
    const ss = seconds % 60;
    return String(mm).padStart(2, '0') + ':' +
           String(ss).padStart(2, '0') + '.' +
           String(centiseconds).padStart(2, '0');
  }

  function resetUI() {
    light.classList.remove('red');
    timerEl.textContent = '00:00.00';
  }

  function loadHistory() {
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    } catch {
      return [];
    }
  }

  function persistHistory(history) {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    } catch {
      // storage non disponibile (es. modalità privata): la cronologia
      // resta comunque in memoria per la sessione corrente
    }
  }

  function renderHistory(history) {
    if (history.length === 0) {
      historySelect.innerHTML = '<option>Nessuna prova ancora</option>';
      return;
    }
    // history è già in ordine cronologico: la prima è la più vecchia,
    // l'ultima è la più recente
    historySelect.innerHTML = history
      .map((entry, i) => `<option>Prova ${i + 1}: ${entry}</option>`)
      .join('');
    historySelect.selectedIndex = history.length - 1;
  }

  let historyData = loadHistory();
  renderHistory(historyData);

  function saveResult(timeText) {
    historyData.push(timeText); // in coda: mantiene l'ordine cronologico
    if (historyData.length > MAX_HISTORY) historyData.shift(); // rimuove la più vecchia
    persistHistory(historyData);
    renderHistory(historyData);
  }

  function resetBestTime() {
    bestTimeMs = null;
    bestTimeEl.textContent = 'Miglior tempo: --:--.--';
  }

  function checkBestTime(elapsedMs) {
    if (bestTimeMs === null || elapsedMs < bestTimeMs) {
      bestTimeMs = elapsedMs;
      bestTimeEl.textContent = 'Miglior tempo: ' + formatTime(bestTimeMs);
      return true;
    }
    return false;
  }

  function startCrono() {
    light.classList.add('red');
    status.textContent = 'Via! Premi Stop';
    startTime = performance.now();
    intervalId = setInterval(() => {
      const elapsed = performance.now() - startTime;
      timerEl.textContent = formatTime(elapsed);
    }, 10);
    stopBtn.disabled = false;
  }

  function stopGame(cancelled) {
    clearTimeout(waitTimeoutId);
    clearInterval(intervalId);
    stopBtn.disabled = true;
    startBtn.disabled = !powerSwitch.checked;
    if (!cancelled) return;
    resetUI();
  }

  powerSwitch.addEventListener('change', () => {
    if (powerSwitch.checked) {
      startBtn.disabled = false;
      status.textContent = 'Premi Start per iniziare';
    } else {
      stopGame(true);
      startBtn.disabled = true;
      status.textContent = "Accendi l'interruttore per iniziare";
      historyData = [];
      persistHistory(historyData);
      renderHistory(historyData);
      resetBestTime();
    }
  });

  startBtn.addEventListener('click', () => {
    resetUI();
    startBtn.disabled = true;
    stopBtn.disabled = true;
    status.textContent = 'Attendi...';

    const delay = (Math.random() * 5 + 1) * 1000; // tra 1 e 6 secondi
    waitTimeoutId = setTimeout(startCrono, delay);
  });

  stopBtn.addEventListener('click', () => {
    const elapsed = performance.now() - startTime;
    clearInterval(intervalId);
    timerEl.textContent = formatTime(elapsed);
    stopBtn.disabled = true;
    startBtn.disabled = !powerSwitch.checked;
    const isRecord = checkBestTime(elapsed);
    status.textContent = (isRecord ? 'Nuovo record! Tempo: ' : 'Tempo registrato: ') + timerEl.textContent;
    saveResult(timerEl.textContent);
  });
</script>

</body>
</html>
