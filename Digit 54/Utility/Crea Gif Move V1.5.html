<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crea Gif Move v 1.5</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #FFEAD0;
    --header:    #D9480F;
    --panel:     #FFE8B0;
    --text:      #1F2937;
    --text-inv:  #FFFFFF;
    --muted:     blue;
    --primary:   #FF7F50;
    --primary-d: #B33A0E;
    --border:    #E6B877;
  }
  body {
    background: var(--bg);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
  }
  .wrap { max-width: 700px; margin: 0 auto; }

  .header {
    background: var(--header);
    color: var(--text-inv);
    padding: 10px 16px;
    border-radius: 4px 4px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1  { font-size: 1.15rem; font-weight: bold; }
  .header .ver{ font-size: 1rem;    font-weight: bold; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 0 4px 4px;
    padding: 16px 18px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .row label.lbl {
    white-space: nowrap;
    min-width: 170px;
    font-size: 0.9rem;
  }
  input[type="text"] {
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
  }
  .inp-path{ flex: 1; min-width: 180px; }
  .inp-nome{ width: 220px; }
  .inp-dur { width: 90px;  }

  button {
    padding: 6px 14px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn-accent { background: var(--primary); color: #fff; }
  .btn-accent:hover   { background: var(--primary-d); }
  .btn-accent:disabled{ background: #ccc; cursor: default; }
  .btn-ghost  { background: var(--panel); color: var(--primary); border: 1px solid var(--primary); }
  .btn-ghost:hover { background: #FFD8A8; color: var(--primary-d); }

  .count { color: var(--muted); font-weight: bold; font-size: 0.9rem; }

  .check-row  { display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 12px; }
  .check-item { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; cursor: pointer; user-select: none; }
  .check-item input   { cursor: pointer; }
  .check-item.disabled{ opacity: 0.45; cursor: default; }
  .check-item.disabled input { cursor: default; pointer-events: none; }

  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .led {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid #888;
    box-shadow: inset 0 0 3px rgba(0,0,0,0.25);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .led-off  { background: var(--panel); }
  .led-red  { background: #ef4444; }
  .led-green{ background: #22c55e; }
  .status-text { color: var(--muted); font-weight: bold; font-size: 0.9rem; }

  .progress-wrap { display: none; margin-bottom: 10px; }
  .progress-bar  { width: 100%; height: 6px; background: #FFD9A0; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.15s; }

  .btn-create { display: block; margin-left: auto; padding: 8px 28px; font-size: 1rem; font-weight: bold; }

  input[type="file"] { display: none; }
  hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🖼️ Crea Gif Move</h1>
    <span class="ver">v 1.5</span>
  </div>

  <div class="card">

    <div class="row">
      <label class="lbl">Cartella immagini:</label>
      <input type="text" id="folderPath" class="inp-path" placeholder="Seleziona cartella…" readonly>
      <button class="btn-accent" onclick="selectFolder()">📂 Cerca cartella</button>
    </div>

    <div class="row">
      <button class="btn-ghost" onclick="selectFiles()">🖼️ Seleziona file (multi)</button>
      <span class="count" id="fileCount">0 file selezionati</span>
    </div>

    <hr>

    <div class="row">
      <label class="lbl">Nome GIF:</label>
      <input type="text" id="gifName" class="inp-nome" value="animazione" onfocus="this.select()">
    </div>

    <div class="row">
      <label class="lbl">Durata frame (ms):</label>
      <input type="text" id="duration" class="inp-dur" value="500" onfocus="this.select()">
      <label class="check-item" style="margin-left:12px;">
        <input type="checkbox" id="reverseOrder"> Inverti ordine
      </label>
    </div>

    <hr>

    <div class="check-row">
      <label class="check-item">
        <input type="checkbox" id="openAfter" checked> Apri GIF dopo la creazione
      </label>
      <label class="check-item disabled" title="Non applicabile nel browser">
        <input type="checkbox" id="alwaysOnTop" checked disabled> Finestra sempre in primo piano
      </label>
    </div>

    <div class="status-row">
      <div class="led led-off" id="led"></div>
      <span class="status-text" id="statusText"></span>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <button class="btn-accent btn-create" id="createBtn" onclick="createGIF()">▶  Crea GIF</button>

  </div>
</div>

<input type="file" id="folderInput" webkitdirectory multiple
       accept=".jpg,.jpeg,.png,.bmp,.webp" onchange="onFolderSelected()">
<input type="file" id="filesInput" multiple
       accept=".jpg,.jpeg,.png,.bmp,.webp" onchange="onFilesSelected()">

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let selectedFiles = [];
let blinkTimer    = null;

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function selectFolder() { document.getElementById('folderInput').click(); }
function selectFiles()  { document.getElementById('filesInput').click();  }

function onFolderSelected() {
  const files = Array.from(document.getElementById('folderInput').files)
    .filter(f => /\.(jpe?g|png|bmp|webp)$/i.test(f.name))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  if (!files.length) return;
  selectedFiles = files;
  document.getElementById('folderPath').value = files[0].webkitRelativePath.split('/')[0];
  document.getElementById('fileCount').textContent = `${files.length} file selezionati (tutti in cartella)`;
}

function onFilesSelected() {
  const files = Array.from(document.getElementById('filesInput').files)
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  if (!files.length) return;
  selectedFiles = files;
  document.getElementById('fileCount').textContent = `${files.length} file selezionati (manuale)`;
}

function setStatus(text) { document.getElementById('statusText').textContent = text; }
function setLed(cls)     { document.getElementById('led').className = 'led ' + cls; }

function startBlink() {
  let on = true;
  blinkTimer = setInterval(() => { setLed(on ? 'led-red' : 'led-off'); on = !on; }, 300);
}
function stopBlink(cls) {
  if (blinkTimer) { clearInterval(blinkTimer); blinkTimer = null; }
  setLed(cls);
}
function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressWrap').style.display = pct < 100 ? 'block' : 'none';
}

// ═══════════════════════════════════════════════════════
//  IMAGE LOADING
// ═══════════════════════════════════════════════════════
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Errore: ' + file.name)); };
    img.src = url;
  });
}
function getImageData(img, w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  return ctx.getImageData(0, 0, w, h);
}

// ═══════════════════════════════════════════════════════
//  QUANTIZZAZIONE ADATTIVA + DITHERING FLOYD-STEINBERG
//
//  Per ogni frame:
//  1. Istogramma 5-5-5 (32768 bin) → top-256 colori
//  2. Tavola di lookup 5-5-5 → indice palette (nearest color)
//  3. Dithering Floyd-Steinberg per eliminare le bande
// ═══════════════════════════════════════════════════════
function quantizeFrame(imageData, width, height) {
  const px = imageData.data;
  const N  = 256;

  // ── 1. Istogramma 5-5-5 ───────────────────────────
  const hist = new Uint32Array(32768);
  for (let i = 0; i < px.length; i += 4) {
    hist[((px[i] >> 3) << 10) | ((px[i+1] >> 3) << 5) | (px[i+2] >> 3)]++;
  }

  // ── 2. Top-256 per frequenza ───────────────────────
  const keys = [];
  for (let i = 0; i < 32768; i++) if (hist[i]) keys.push(i);
  keys.sort((a, b) => hist[b] - hist[a]);
  const sel    = keys.slice(0, N);
  const nCol   = sel.length;

  // ── 3. Palette 256×3 (zero-padded = nero) ─────────
  const palette = new Uint8Array(N * 3);
  for (let i = 0; i < nCol; i++) {
    const c  = sel[i];
    const r5 = (c >> 10) & 31;
    const g5 = (c >>  5) & 31;
    const b5 =  c        & 31;
    // Espansione 5→8 bit (replica i bit alti nei bassi)
    palette[i*3]   = (r5 << 3) | (r5 >> 2);
    palette[i*3+1] = (g5 << 3) | (g5 >> 2);
    palette[i*3+2] = (b5 << 3) | (b5 >> 2);
  }

  // ── 4. Lookup 5-5-5 → indice palette (32768 voci) ─
  //     Calcolato una volta per frame; costo O(32768 × nCol)
  const lookup = new Uint8Array(32768);
  for (let c = 0; c < 32768; c++) {
    const r5 = (c >> 10) & 31;
    const g5 = (c >>  5) & 31;
    const b5 =  c        & 31;
    const r8 = (r5 << 3) | (r5 >> 2);
    const g8 = (g5 << 3) | (g5 >> 2);
    const b8 = (b5 << 3) | (b5 >> 2);
    let best = 0, bestDist = 0x7FFFFFFF;
    for (let i = 0; i < nCol; i++) {
      const dr = palette[i*3]   - r8;
      const dg = palette[i*3+1] - g8;
      const db = palette[i*3+2] - b8;
      const d  = dr*dr + dg*dg + db*db;
      if (d < bestDist) { bestDist = d; best = i; }
    }
    lookup[c] = best;
  }

  // ── 5. Dithering Floyd-Steinberg ──────────────────
  //   Buffer Int16 per accumulare l'errore di quantizzazione
  const R = new Int16Array(width * height);
  const G = new Int16Array(width * height);
  const B = new Int16Array(width * height);
  for (let i = 0, j = 0; i < px.length; i += 4, j++) {
    R[j] = px[i]; G[j] = px[i+1]; B[j] = px[i+2];
  }

  const indices = new Uint8Array(width * height);

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const p = y * width + x;

      // Clamp al range 0-255
      const r = R[p] < 0 ? 0 : R[p] > 255 ? 255 : R[p];
      const g = G[p] < 0 ? 0 : G[p] > 255 ? 255 : G[p];
      const b = B[p] < 0 ? 0 : B[p] > 255 ? 255 : B[p];

      // Lookup colore più vicino tramite 5-5-5
      const key = ((r >> 3) << 10) | ((g >> 3) << 5) | (b >> 3);
      const idx = lookup[key];
      indices[p] = idx;

      // Errore di quantizzazione
      const er = r - palette[idx*3];
      const eg = g - palette[idx*3+1];
      const eb = b - palette[idx*3+2];

      // Distribuzione errore Floyd-Steinberg:
      //   [ .   *   7/16 ]
      //   [ 3/16 5/16 1/16 ]
      if (x + 1 < width) {
        const q = p + 1;
        R[q] += er * 7 >> 4;
        G[q] += eg * 7 >> 4;
        B[q] += eb * 7 >> 4;
      }
      if (y + 1 < height) {
        const n = p + width;
        if (x > 0)         { R[n-1] += er*3>>4; G[n-1] += eg*3>>4; B[n-1] += eb*3>>4; }
                             { R[n]   += er*5>>4; G[n]   += eg*5>>4; B[n]   += eb*5>>4; }
        if (x + 1 < width) { R[n+1] += er  >>4; G[n+1] += eg  >>4; B[n+1] += eb  >>4; }
      }
    }
  }

  return { palette, indices };
}

// ═══════════════════════════════════════════════════════
//  GIF LZW ENCODER
// ═══════════════════════════════════════════════════════
function lzwEncode(minCodeSize, data) {
  const CLEAR = 1 << minCodeSize;  // 256
  const EOI   = CLEAR + 1;         // 257

  let bits = 0, bitLen = 0;
  const out = [];

  function write(code, cs) {
    bits   |= code << bitLen;
    bitLen += cs;
    while (bitLen >= 8) { out.push(bits & 0xFF); bits >>>= 8; bitLen -= 8; }
  }

  let table, codeSize, nextCode;

  function reset() {
    table    = new Map();
    nextCode = EOI + 1;   // 258
    codeSize = minCodeSize + 1;  // 9
  }

  reset();
  write(CLEAR, codeSize);

  let prefix = data[0];

  for (let i = 1; i < data.length; i++) {
    const pixel = data[i];
    const key   = prefix * 256 + pixel;  // univoco: prefix<4096, pixel<256

    if (table.has(key)) {
      prefix = table.get(key);
    } else {
      write(prefix, codeSize);

      if (nextCode < 4096) {
        table.set(key, nextCode++);
        if (nextCode > (1 << codeSize)) codeSize++;
      } else {
        write(CLEAR, codeSize);
        reset();
      }

      prefix = pixel;
    }
  }

  write(prefix, codeSize);
  write(EOI,    codeSize);
  if (bitLen > 0) out.push(bits & 0xFF);
  return out;
}

function packSubBlocks(data) {
  const out = [];
  for (let i = 0; i < data.length; ) {
    const len = Math.min(255, data.length - i);
    out.push(len);
    for (let j = 0; j < len; j++) out.push(data[i + j]);
    i += len;
  }
  out.push(0);
  return out;
}

// ═══════════════════════════════════════════════════════
//  GIF89a FILE BUILDER
//  Usa Local Color Table per ogni frame → palette adattiva
// ═══════════════════════════════════════════════════════
function buildGIF(frames, width, height, delayMs, loop) {
  const out     = [];
  const push    = (...b)  => out.push(...b);
  const pushStr = s       => { for (const c of s) out.push(c.charCodeAt(0)); };
  const u16le   = v       => [v & 0xFF, (v >> 8) & 0xFF];
  const delayCS = Math.max(1, Math.round(delayMs / 10));

  // ── Header ────────────────────────────────────────
  pushStr('GIF89a');

  // ── Logical Screen Descriptor (no Global CT) ──────
  push(...u16le(width), ...u16le(height));
  push(0x70, 0x00, 0x00);  // bit7=0: no global CT | color-res=7 | bg=0 | aspect=0

  // ── Netscape Application Extension (loop) ─────────
  push(0x21, 0xFF, 0x0B);
  pushStr('NETSCAPE2.0');
  push(0x03, 0x01, ...u16le(loop), 0x00);

  // ── Frames ────────────────────────────────────────
  for (const { palette, indices } of frames) {

    // Graphic Control Extension
    push(0x21, 0xF9, 0x04);
    push(0x00);                  // disposal=0, no transparency
    push(...u16le(delayCS));
    push(0x00, 0x00);            // transparent index + block terminator

    // Image Descriptor  ← Local Color Table abilitato
    push(0x2C);
    push(...u16le(0), ...u16le(0));           // left=0, top=0
    push(...u16le(width), ...u16le(height));
    push(0x87);  // bit7=1: local CT | bit6=0: non interlacciato | bit0-2=7: 256 colori

    // Local Color Table (256 × 3 = 768 byte)
    for (let i = 0; i < 768; i++) out.push(palette[i]);

    // Image Data LZW (minCodeSize=8 per 256 colori)
    push(8);
    packSubBlocks(lzwEncode(8, indices)).forEach(b => push(b));
  }

  push(0x3B);  // Trailer
  return new Uint8Array(out);
}

// ═══════════════════════════════════════════════════════
//  MAIN – CREA GIF
// ═══════════════════════════════════════════════════════
async function createGIF() {
  if (!selectedFiles.length) {
    alert('Seleziona una cartella o alcuni file immagine.');
    return;
  }

  const duration  = Math.max(1, parseInt(document.getElementById('duration').value) || 500);
  const reverse   = document.getElementById('reverseOrder').checked;
  const openAfter = document.getElementById('openAfter').checked;

  let gifName = document.getElementById('gifName').value.trim() || 'animazione';
  if (gifName.toLowerCase().endsWith('.gif')) gifName = gifName.slice(0, -4);
  const filename = `${gifName}_${duration}.gif`;

  let files = [...selectedFiles];
  if (reverse) files = files.reverse();

  document.getElementById('createBtn').disabled = true;
  startBlink();
  setProgress(0);
  setStatus('Caricamento immagini…');

  try {
    const firstImg = await loadImage(files[0]);
    const refW     = firstImg.width;
    const refH     = firstImg.height;

    const frames = [];

    for (let i = 0; i < files.length; i++) {
      setStatus(`Elaborazione frame ${i + 1} / ${files.length}…`);
      setProgress(Math.round((i / files.length) * 90));

      const img  = await loadImage(files[i]);
      const data = getImageData(img, refW, refH);
      frames.push(quantizeFrame(data, refW, refH));

      await new Promise(r => setTimeout(r, 0));  // yield UI
    }

    setStatus('Assemblaggio GIF…');
    setProgress(95);
    await new Promise(r => setTimeout(r, 10));

    const gifData = buildGIF(frames, refW, refH, duration, 0);

    setProgress(100);
    stopBlink('led-green');
    setStatus(`GIF creata: ${filename}`);

    const blob = new Blob([gifData], { type: 'image/gif' });
    const url  = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();

    if (openAfter) window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 15000);

  } catch (e) {
    stopBlink('led-off');
    setStatus('Errore: ' + e.message);
    alert('Errore: ' + e.message);
  }

  document.getElementById('createBtn').disabled = false;
  document.getElementById('progressWrap').style.display = 'none';
}
</script>
</body>
</html>
