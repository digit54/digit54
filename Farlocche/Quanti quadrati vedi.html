<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quanti quadrati vedi?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f9a8d4 0%, #fcd34d 50%, #6ee7b7 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 30px 16px;
    }

    .container {
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      padding: 28px 32px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 28px;
      min-width: 300px;
    }

    .pannello {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 160px;
    }

    .colonna-canvas {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    @media (max-width: 820px) {
      .container {
        flex-direction: column;
      }
    }

    h1 {
      font-size: 1.2rem;
      color: #7c3aed;
      margin-bottom: 4px;
      text-align: center;
    }

    label {
      font-size: 0.95rem;
      color: #0369a1;
      font-weight: 600;
    }

    input[type="number"] {
      width: 100px;
      padding: 6px 10px;
      font-size: 1rem;
      text-align: center;
      border: 2px solid #f472b6;
      border-radius: 20px;
      outline: none;
      background: #fff0f8;
    }

    input[type="number"]:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168,85,247,0.2);
      background: #fff;
    }

    button {
      padding: 8px 28px;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f472b6, #a855f7);
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 3px 10px rgba(168,85,247,0.35);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 16px rgba(168,85,247,0.45);
    }

    button:active { transform: translateY(0); }

    #risultato {
      font-size: 1.15rem;
      font-weight: bold;
      color: #059669;
      min-height: 1.4em;
      background: #ecfdf5;
      padding: 6px 18px;
      border-radius: 20px;
      border: 2px solid #6ee7b7;
    }

    #risultato:empty {
      background: transparent;
      border-color: transparent;
    }

    canvas {
      border: 3px solid #a855f7;
      border-radius: 8px;
      background: #fff;
      display: block;
    }

    .error {
      color: #dc2626;
      font-size: 0.9rem;
      min-height: 1.2em;
      font-weight: 600;
    }

    .opzione-colora {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .opzione-colora input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #a855f7;
    }

    .opzione-colora label {
      cursor: pointer;
    }

    #contatore {
      font-size: 1rem;
      font-weight: bold;
      color: #7c3aed;
      background: #f5f3ff;
      padding: 6px 18px;
      border-radius: 20px;
      border: 2px solid #c4b5fd;
    }

    .opzione-velocita {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .opzione-velocita label {
      font-size: 0.85rem;
    }

    .opzione-velocita input[type="range"] {
      width: 180px;
      accent-color: #a855f7;
      cursor: pointer;
    }

    .watermark {
      position: fixed;
      bottom: 8px;
      right: 14px;
      font-size: 0.75rem;
      color: rgba(0,0,0,0.2);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="pannello">
    <label for="inputN">Inserisci n quadretti per lato:</label>
    <input type="number" id="inputN" min="1" max="200" autofocus>
    <button onclick="genera()">Genera griglia</button>
    <div class="error" id="errore"></div>
  </div>

  <div class="colonna-canvas">
    <h1>Quanti quadrati vedi?</h1>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="opzione-colora">
      <input type="checkbox" id="checkColora">
      <label for="checkColora">Mostra i quadrati uno alla volta</label>
    </div>
    <div id="contatore">Quadrato: -</div>
    <div class="opzione-velocita">
      <label for="inputVelocita">Velocità: <span id="velocitaValore">400</span> ms</label>
      <input type="range" id="inputVelocita" min="100" max="700" step="50" value="400">
    </div>
  </div>

  <div class="pannello">
    <input type="number" id="inputVisti" min="0">
    <button onclick="calcolaReali()">Calcola quelli reali</button>
    <div class="error" id="erroreVisti"></div>
    <div id="risultato"></div>
  </div>
</div>

<div class="watermark">Digit54 V. 1.0</div>

<script>
  let nCorrente = null;
  let quadratiList = [];
  let indiceCorrente = 0;
  let timerAnimazione = null;
  let intervalloMs = 400;

  document.getElementById('inputN').addEventListener('keydown', e => {
    if (e.key === 'Enter') genera();
  });

  document.getElementById('inputVisti').addEventListener('keydown', e => {
    if (e.key === 'Enter') calcolaReali();
  });

  document.getElementById('checkColora').addEventListener('change', e => {
    if (e.target.checked) {
      avviaAnimazione();
    } else {
      fermaAnimazione();
    }
  });

  document.getElementById('inputVelocita').addEventListener('input', e => {
    intervalloMs = parseInt(e.target.value);
    document.getElementById('velocitaValore').textContent = intervalloMs;

    if (timerAnimazione !== null) {
      clearInterval(timerAnimazione);
      timerAnimazione = setInterval(() => {
        indiceCorrente = (indiceCorrente + 1) % quadratiList.length;
        mostraQuadratoCorrente();
      }, intervalloMs);
    }
  });

  function costruisciListaQuadrati(n) {
    quadratiList = [];
    for (let size = 1; size <= n; size++) {
      for (let row = 0; row <= n - size; row++) {
        for (let col = 0; col <= n - size; col++) {
          quadratiList.push({ size, row, col });
        }
      }
    }
  }

  function avviaAnimazione() {
    clearInterval(timerAnimazione);
    if (nCorrente === null) {
      document.getElementById('checkColora').checked = false;
      return;
    }

    costruisciListaQuadrati(nCorrente);
    indiceCorrente = 0;
    mostraQuadratoCorrente();
    timerAnimazione = setInterval(() => {
      indiceCorrente = (indiceCorrente + 1) % quadratiList.length;
      mostraQuadratoCorrente();
    }, intervalloMs);
  }

  function fermaAnimazione() {
    clearInterval(timerAnimazione);
    timerAnimazione = null;
    document.getElementById('contatore').textContent = 'Quadrato: -';
    if (nCorrente !== null) disegnaGriglia(nCorrente);
  }

  function mostraQuadratoCorrente() {
    disegnaGriglia(nCorrente);
    evidenziaQuadrato(quadratiList[indiceCorrente]);
    document.getElementById('contatore').textContent =
      `Quadrato ${indiceCorrente + 1} di ${quadratiList.length}`;
  }

  function evidenziaQuadrato(q) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const cell = canvas.width / nCorrente;

    ctx.strokeStyle = '#dc2626';
    ctx.lineWidth = 4;
    ctx.strokeRect(q.col * cell, q.row * cell, q.size * cell, q.size * cell);
  }

  function genera() {
    const input = document.getElementById('inputN');
    const errore = document.getElementById('errore');
    const erroreVisti = document.getElementById('erroreVisti');
    const risultato = document.getElementById('risultato');
    errore.textContent = '';
    erroreVisti.textContent = '';
    risultato.textContent = '';
    document.getElementById('inputVisti').value = '';

    const n = parseInt(input.value);
    if (!n || n <= 0 || !Number.isInteger(n)) {
      errore.textContent = 'Inserisci un numero intero positivo.';
      input.focus();
      nCorrente = null;
      return;
    }

    nCorrente = n;
    disegnaGriglia(n);
    document.getElementById('inputVisti').focus();

    if (document.getElementById('checkColora').checked) {
      avviaAnimazione();
    }
  }

  function calcolaReali() {
    const inputVisti = document.getElementById('inputVisti');
    const erroreVisti = document.getElementById('erroreVisti');
    const risultato = document.getElementById('risultato');
    erroreVisti.textContent = '';
    risultato.textContent = '';

    if (nCorrente === null) {
      erroreVisti.textContent = 'Genera prima una griglia.';
      return;
    }

    const visti = parseInt(inputVisti.value);
    if (isNaN(visti) || visti < 0 || !Number.isInteger(visti)) {
      erroreVisti.textContent = 'Inserisci un numero intero non negativo.';
      inputVisti.focus();
      return;
    }

    // Formula quadrati: n*(n+1)*(2n+1)/6
    const totale = nCorrente * (nCorrente + 1) * (2 * nCorrente + 1) / 6;

    if (visti === totale) {
      risultato.textContent = `Esatto! I quadrati totali sono ${totale}.`;
    } else {
      risultato.textContent = `Hai detto ${visti}, ma i quadrati totali sono ${totale}.`;
    }
  }

  function disegnaGriglia(n) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const size = 400;
    const cell = size / n;

    ctx.clearRect(0, 0, size, size);

    ctx.strokeStyle = 'black';
    ctx.lineWidth = 1;

    // Linee verticali
    for (let i = 0; i <= n; i++) {
      const x = i * cell;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, size);
      ctx.stroke();
    }

    // Linee orizzontali
    for (let i = 0; i <= n; i++) {
      const y = i * cell;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(size, y);
      ctx.stroke();
    }
  }
</script>
</body>
</html>
