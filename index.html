<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Digit 54 - Le mie pagine HTML</title>
<script src="dati.js"></script>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: url("menu_sfondo.png") no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
    }
    .container {
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        padding: 50px 24px;
        box-sizing: border-box;
        text-align: center;
    }
    h1 {
        font-size: 2.6em;
        font-weight: 800;
        margin: 0 0 40px;
        letter-spacing: 1px;
        background: linear-gradient(90deg, #0e7490, #22d3ee);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 10px rgba(34,211,238,0.55));
    }
    .menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 22px;
    }
    .btn {
        flex: 1 1 380px;
        max-width: 420px;
        box-sizing: border-box;
        padding: 22px 20px;
        background-color: rgba(30, 41, 59, 0.8);
        border: 2px solid #22d3ee;
        border-radius: 14px;
        color: #67e8f9;
        font-size: 1.25em;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 0 14px rgba(34,211,238,0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }
    .btn:hover {
        background-color: rgba(30, 41, 59, 0.95);
        box-shadow: 0 0 22px rgba(34,211,238,0.6);
        transform: translateY(-2px);
    }
</style>
</head>
<body>
<div class="container">
    <h1>Digit 54 - Le mie pagine HTML</h1>
    <div class="menu" id="menu"></div>
</div>
<script>
    const menu = document.getElementById("menu");
    Object.keys(DATI).sort().forEach(function (cat) {
        const a = document.createElement("a");
        a.className = "btn";
        a.href = encodeURIComponent(cat) + "/index.html";
        a.textContent = cat.replace(/_/g, " ");
        menu.appendChild(a);
    });
</script>
</body>
</html>
