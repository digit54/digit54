<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Programmini seri ma non troppo</title>
<script src="dati.js"></script>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: url("menu_sfondo.png") no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
    }
    .container {
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        padding: 20px 24px;
        box-sizing: border-box;
        text-align: center;
    }
    .logo {
        width: 260px;
        height: auto;
        margin: 0 auto 10px;
        display: block;
        filter: drop-shadow(0 0 18px rgba(34,211,238,0.5));
    }
    .menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 22px;
    }
    .btn-wrap {
        position: relative;
        flex: 1 1 380px;
        max-width: 420px;
        padding-bottom: 8px;
    }
    .btn {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 22px 20px;
        background-color: rgba(30, 41, 59, 0.8);
        border: 2px solid #22d3ee;
        border-radius: 14px;
        color: #67e8f9;
        font-size: 1.25em;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 0 14px rgba(34,211,238,0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }
    .btn:hover {
        background-color: rgba(30, 41, 59, 0.95);
        box-shadow: 0 0 22px rgba(34,211,238,0.6);
        transform: translateY(-2px);
    }
    .dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background-color: rgba(15, 23, 42, 0.97);
        border: 2px solid #22d3ee;
        border-radius: 12px;
        box-shadow: 0 0 22px rgba(34,211,238,0.5);
        padding: 8px;
        box-sizing: border-box;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-6px);
        transition: opacity 0.18s ease, transform 0.18s ease;
        z-index: 10;
        text-align: left;
    }
    .dropdown.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
    }
    .dropdown a {
        display: block;
        padding: 8px 10px;
        color: #cffafe;
        text-decoration: none;
        font-size: 0.9em;
        font-weight: 500;
        border-radius: 8px;
    }
    .dropdown a:hover {
        background-color: rgba(34,211,238,0.18);
        color: #67e8f9;
    }
    .dropdown .empty {
        padding: 8px 10px;
        color: #64748b;
        font-size: 0.85em;
        font-style: italic;
    }
</style>
</head>
<body>
<div class="container">
    <img class="logo" src="Logo_full.png" alt="Programmini seri ma non troppo">
    <div class="menu" id="menu"></div>
</div>
<script>
    const menu = document.getElementById("menu");
    const HOVER_DELAY = 800;

    Object.keys(DATI).sort().forEach(function (cat) {
        const wrap = document.createElement("div");
        wrap.className = "btn-wrap";

        const catPath = encodeURIComponent(cat) + "/";

        const a = document.createElement("a");
        a.className = "btn";
        a.href = catPath + "index.html";
        a.textContent = cat.replace(/_/g, " ");
        wrap.appendChild(a);

        const dropdown = document.createElement("div");
        dropdown.className = "dropdown";
        const programmi = DATI[cat];
        if (programmi.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "Nessun programma";
            dropdown.appendChild(empty);
        } else {
            programmi.forEach(function (p) {
                const link = document.createElement("a");
                link.href = catPath + encodeURIComponent(p.file);
                link.textContent = p.nome;
                dropdown.appendChild(link);
            });
        }
        wrap.appendChild(dropdown);

        let hoverTimer = null;
        wrap.addEventListener("mouseenter", function () {
            hoverTimer = setTimeout(function () {
                dropdown.classList.add("show");
            }, HOVER_DELAY);
        });
        wrap.addEventListener("mouseleave", function () {
            clearTimeout(hoverTimer);
            dropdown.classList.remove("show");
        });

        menu.appendChild(wrap);
    });
</script>
</body>
</html>
