<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Startlist 2026 — Squadre e Corridori</title>
<style>
  :root{
    --ink:#0a1526;
    --paper:#f6f5f1;
    --panel:#ffffff;
    --accent:#c94f3d;
    --accent-dark:#7a291c;
    --line:#c9c4b8;
    --text-dark:#1a2433;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --grid-cols: 2.2fr 0.9fr 2fr 1.4fr 0.7fr;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    font-family:'Georgia','Times New Roman',serif;
    color:var(--ink);
    padding:40px 24px 80px;
  }
  h1{
    font-family:'Georgia',serif;
    font-weight:700;
    font-size:clamp(28px,4vw,42px);
    letter-spacing:-0.01em;
    margin:0 0 4px;
  }
  .subtitle{
    font-family:var(--mono);
    text-transform:uppercase;
    letter-spacing:0.12em;
    font-size:12px;
    font-weight:700;
    color:var(--accent-dark);
    margin:0 0 28px;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
  }
  #search{
    all:unset;
    box-sizing:border-box;
    display:block;
    width:100%;
    font-family:var(--mono);
    font-size:14px;
    padding:12px 16px;
    margin-bottom:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    color:var(--ink);
  }
  #search::placeholder{ color:#9aa2ad; }
  #search:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,79,61,0.12); }

  .table-shell{
    background:transparent;
  }

  /* Header row: distinct box tiles */
  .head-row{
    display:grid;
    grid-template-columns: var(--grid-cols);
    gap:6px;
    margin-bottom:8px;
    position:sticky;
    top:0;
    z-index:2;
  }
  .head-box{
    background:var(--ink);
    border-radius:6px;
    box-shadow:0 2px 5px rgba(18,33,58,0.2);
    overflow:hidden;
  }
  .head-box button{
    all:unset;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    width:100%;
    padding:13px 16px;
    cursor:pointer;
    color:#fff;
    font-family:var(--mono);
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:800;
    box-sizing:border-box;
    transition:background 0.15s ease;
  }
  .head-box button:hover{ background:rgba(255,255,255,0.1); }
  .head-box button:focus-visible{ outline:2px solid var(--accent); outline-offset:-2px; }
  .arrow{
    font-size:11px;
    opacity:0.35;
    transition:opacity 0.15s ease, transform 0.15s ease;
    flex-shrink:0;
  }
  .arrow.active{ opacity:1; color:var(--accent); }
  .arrow.desc{ transform:rotate(180deg); }

  /* Body rows */
  .table-body{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(18,33,58,0.06);
  }
  .row{
    display:grid;
    grid-template-columns: var(--grid-cols);
    border-bottom:1px solid var(--line);
  }
  .row:last-child{ border-bottom:none; }
  .row:nth-child(even){ background:#fbfaf7; }
  .row:hover{ background:#f1e9e2; }
  .cell{
    padding:11px 16px;
    font-family:var(--mono);
    font-size:15px;
    font-weight:600;
    color:var(--text-dark);
    vertical-align:top;
    display:flex;
    align-items:center;
  }
  .cell.team{
    color:var(--ink);
    font-weight:800;
    border-left:3px solid var(--accent);
    margin-left:-3px;
    padding-left:13px;
  }
  .cell.nat{ color:var(--text-dark); font-weight:600; }
  .cell.bib{ color:var(--ink); font-weight:800; justify-content:center; }
  .cell.age{ color:var(--text-dark); font-weight:700; justify-content:center; }

  .count{
    font-family:var(--mono);
    font-size:12px;
    font-weight:600;
    color:var(--text-dark);
    margin:14px 4px 0;
  }
  .count strong{ color:var(--ink); font-weight:800; }

  @media (max-width:640px){
    :root{ --grid-cols: 1.6fr 0.7fr 1.6fr 1.1fr 0.6fr; }
    .head-box button{ padding:12px 6px; font-size:11px; }
    .cell{ padding:9px 6px; font-size:13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Startlist 2026</h1>
  <p class="subtitle">Squadre · Corridori · Nazionalità — clicca un riquadro per ordinare</p>

  <input type="text" id="search" placeholder="Cerca squadra, corridore o nazionalità…" autocomplete="off">

  <div class="table-shell">
    <div class="head-row" id="headRow">
      <div class="head-box" data-col="0"><button type="button">Squadra <span class="arrow">▲</span></button></div>
      <div class="head-box" data-col="1"><button type="button">Pettorale <span class="arrow">▲</span></button></div>
      <div class="head-box" data-col="2"><button type="button">Ciclista <span class="arrow">▲</span></button></div>
      <div class="head-box" data-col="3"><button type="button">Nazionalità <span class="arrow">▲</span></button></div>
      <div class="head-box" data-col="4"><button type="button">Età <span class="arrow">▲</span></button></div>
    </div>
    <div class="table-body" id="tbody"></div>
  </div>
  <p class="count"><strong id="rowcount">0</strong> corridori totali</p>
</div>

function render(rows){
  const body = document.getElementById('tbody');
  body.innerHTML = rows.map(r => `
    <div class="row">
      <div class="cell team">${r[0]}</div>
      <div class="cell bib">${r[1]}</div>
      <div class="cell">${r[2]}</div>
      <div class="cell nat">${r[3]}</div>
      <div class="cell age">${r[4]}</div>
    </div>
  `).join('');
  document.getElementById('rowcount').textContent = rows.length;
}

function getFiltered(){
  let rows = DATA;
  if(currentQuery){
    rows = rows.filter(r => r.some(v => String(v).toLowerCase().includes(currentQuery)));
  }
  if(currentSort.col !== null){
    const numericCols = [1, 4];
    rows = [...rows].sort((a,b) => {
      if(numericCols.includes(currentSort.col)){
        return (a[currentSort.col] - b[currentSort.col]) * currentSort.dir;
      }
      return a[currentSort.col].localeCompare(b[currentSort.col], 'it', {sensitivity:'base'}) * currentSort.dir;
    });
  }
  return rows;
}

function sortBy(col){
  if(currentSort.col === col){
    currentSort.dir *= -1;
  } else {
    currentSort.col = col;
    currentSort.dir = 1;
  }
  render(getFiltered());

  document.querySelectorAll('.head-box .arrow').forEach((el, idx) => {
    el.classList.toggle('active', idx === col);
    el.classList.toggle('desc', idx === col && currentSort.dir === -1);
    el.textContent = '▲';
  });
}

document.querySelectorAll('.head-box').forEach(box => {
  box.querySelector('button').addEventListener('click', () => sortBy(Number(box.dataset.col)));
});

document.getElementById('search').addEventListener('input', (e) => {
  currentQuery = e.target.value.trim().toLowerCase();
  render(getFiltered());
});

render(DATA);
